        /* Minimal markdown renderer for portal report content.
           Handles: # headers, **bold**, *italic*, `code`, > quotes,
           - bullet lists, numbered lists, --- rules, | tables |, paragraphs. */
        const MdInline = ({ text }) => {
            // Process inline: **bold**, *italic*, `code`
            const parts = [];
            let remaining = text;
            let key = 0;
            const pat = /(\*\*[^*]+\*\*|\*[^*\n]+\*|`[^`\n]+`)/;
            while (remaining.length) {
                const m = remaining.match(pat);
                if (!m) { parts.push(remaining); break; }
                if (m.index > 0) parts.push(remaining.slice(0, m.index));
                const t = m[0];
                if (t.startsWith('**')) {
                    parts.push(<strong key={key++} style={{ color: 'var(--ink)' }}>{t.slice(2, -2)}</strong>);
                } else if (t.startsWith('`')) {
                    parts.push(<code key={key++} style={{ background: 'var(--cloud)', padding: '1px 5px', borderRadius: 3, fontSize: '0.92em', fontFamily: 'ui-monospace, SFMono-Regular, Menlo, monospace' }}>{t.slice(1, -1)}</code>);
                } else {
                    parts.push(<em key={key++}>{t.slice(1, -1)}</em>);
                }
                remaining = remaining.slice(m.index + t.length);
            }
            return <>{parts}</>;
        };

        const Markdown = ({ content }) => {
            if (!content) return null;
            const lines = content.split('\n');
            const blocks = [];
            let i = 0;
            let key = 0;
            while (i < lines.length) {
                const line = lines[i];
                // Horizontal rule
                if (/^\s*---+\s*$/.test(line)) {
                    blocks.push(<hr key={key++} style={{ border: 'none', borderTop: '1px solid var(--cloud)', margin: '24px 0' }} />);
                    i++; continue;
                }
                // Headers
                let hm = line.match(/^(#{1,4})\s+(.+)$/);
                if (hm) {
                    const level = hm[1].length;
                    const text = hm[2];
                    const sizes = { 1: '1.875rem', 2: '1.5rem', 3: '1.25rem', 4: '1.05rem' };
                    const margins = { 1: '32px 0 16px', 2: '28px 0 14px', 3: '22px 0 10px', 4: '18px 0 8px' };
                    blocks.push(
                        <div key={key++} style={{ fontSize: sizes[level], fontWeight: 600, color: 'var(--ink)', margin: margins[level], lineHeight: 1.25 }}>
                            <MdInline text={text} />
                        </div>
                    );
                    i++; continue;
                }
                // Blockquote
                if (/^>\s?/.test(line)) {
                    const qlines = [];
                    while (i < lines.length && /^>\s?/.test(lines[i])) {
                        qlines.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    blocks.push(
                        <blockquote key={key++} style={{ borderLeft: '3px solid var(--accent)', background: 'var(--accent-faint)', padding: '10px 14px', margin: '12px 0', color: 'var(--ink-light)', fontStyle: 'italic', lineHeight: 1.6 }}>
                            <MdInline text={qlines.join(' ')} />
                        </blockquote>
                    );
                    continue;
                }
                // Table — line with pipes and next line is separator
                if (line.includes('|') && i + 1 < lines.length && /^\s*\|?[\s\-|:]+\|?\s*$/.test(lines[i+1]) && lines[i+1].includes('-')) {
                    const parseRow = (row) => row.replace(/^\s*\|/, '').replace(/\|\s*$/, '').split('|').map(c => c.trim());
                    const headers = parseRow(lines[i]);
                    i += 2; // skip header + separator
                    const rows = [];
                    while (i < lines.length && lines[i].includes('|') && lines[i].trim() !== '') {
                        rows.push(parseRow(lines[i]));
                        i++;
                    }
                    blocks.push(
                        <div key={key++} style={{ overflowX: 'auto', margin: '14px 0', border: '1px solid var(--cloud)', borderRadius: 8 }}>
                            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.92em' }}>
                                <thead>
                                    <tr style={{ background: 'var(--mist)' }}>
                                        {headers.map((h, hi) => (
                                            <th key={hi} style={{ padding: '10px 12px', textAlign: 'left', fontWeight: 600, color: 'var(--ink)', borderBottom: '1px solid var(--cloud)' }}>
                                                <MdInline text={h} />
                                            </th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody>
                                    {rows.map((r, ri) => (
                                        <tr key={ri} style={{ borderBottom: ri < rows.length - 1 ? '1px solid var(--cloud)' : 'none' }}>
                                            {r.map((c, ci) => (
                                                <td key={ci} style={{ padding: '10px 12px', verticalAlign: 'top', color: 'var(--ink-light)', lineHeight: 1.55 }}>
                                                    <MdInline text={c} />
                                                </td>
                                            ))}
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    );
                    continue;
                }
                // Bullet list
                if (/^\s*[-*]\s+/.test(line)) {
                    const items = [];
                    while (i < lines.length && /^\s*[-*]\s+/.test(lines[i])) {
                        items.push(lines[i].replace(/^\s*[-*]\s+/, ''));
                        i++;
                    }
                    blocks.push(
                        <ul key={key++} style={{ margin: '8px 0 12px 20px', padding: 0, listStyleType: 'disc', color: 'var(--ink-light)' }}>
                            {items.map((it, ii) => (
                                <li key={ii} style={{ margin: '4px 0', lineHeight: 1.6 }}><MdInline text={it} /></li>
                            ))}
                        </ul>
                    );
                    continue;
                }
                // Numbered list
                if (/^\s*\d+\.\s+/.test(line)) {
                    const items = [];
                    while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
                        items.push(lines[i].replace(/^\s*\d+\.\s+/, ''));
                        i++;
                    }
                    blocks.push(
                        <ol key={key++} style={{ margin: '8px 0 12px 20px', padding: 0, color: 'var(--ink-light)' }}>
                            {items.map((it, ii) => (
                                <li key={ii} style={{ margin: '6px 0', lineHeight: 1.6 }}><MdInline text={it} /></li>
                            ))}
                        </ol>
                    );
                    continue;
                }
                // Empty line — skip
                if (line.trim() === '') { i++; continue; }
                // Paragraph — collect consecutive non-empty, non-special lines
                const plines = [];
                while (i < lines.length && lines[i].trim() !== '' && !/^(#{1,4}\s|>\s?|\s*[-*]\s+|\s*\d+\.\s+|\s*---+\s*$)/.test(lines[i]) && !(lines[i].includes('|') && i+1 < lines.length && /^\s*\|?[\s\-|:]+\|?\s*$/.test(lines[i+1]))) {
                    plines.push(lines[i]);
                    i++;
                }
                if (plines.length) {
                    blocks.push(
                        <p key={key++} style={{ margin: '10px 0', lineHeight: 1.65, color: 'var(--ink-light)' }}>
                            <MdInline text={plines.join(' ')} />
                        </p>
                    );
                }
            }
            return <div className="markdown-body" style={{ color: 'var(--ink-light)' }}>{blocks}</div>;
        };

        /* NudgeStyleSection — applies section-specific rendering enhancements
           (numbered finding circles, variant cards, callout boxes, pillar numbers,
           day badges, final-diagnosis box) per Nudge's positioning report design.
           Falls back to plain Markdown for sections without special handling. */
        const NudgeStyleSection = ({ title, body }) => {
            const firstWord = title.split(/[\s\)]/)[0];

            /* Executive Summary: first paragraph becomes red callout, bulleted findings
               become numbered circles with bold title + sub-detail. */
            if (/^A\)?\s*Executive Summary/i.test(title) || /^Executive Summary/i.test(title)) {
                const lines = body.split('\n');
                const introLines = [];
                let i = 0;
                while (i < lines.length && !/^\s*-\s+/.test(lines[i])) {
                    introLines.push(lines[i]);
                    i++;
                }
                const intro = introLines.join('\n').trim();
                const findings = [];
                while (i < lines.length) {
                    if (/^\s*-\s+/.test(lines[i])) {
                        const item = [lines[i].replace(/^\s*-\s+/, '')];
                        i++;
                        while (i < lines.length && !/^\s*-\s+/.test(lines[i]) && lines[i].trim() !== '') {
                            item.push(lines[i]);
                            i++;
                        }
                        const txt = item.join(' ').trim();
                        const m = txt.match(/^\*\*([^*]+?)\*\*\s*(.*)$/s);
                        if (m) findings.push({ title: m[1].trim(), text: m[2].trim() });
                        else findings.push({ title: '', text: txt });
                    } else {
                        i++;
                    }
                }
                return (
                    <div>
                        {intro && (
                            <div className="rounded-lg p-5 border-l-4 mb-6" style={{ background: 'var(--danger-light)', borderColor: 'var(--danger)' }}>
                                <p className="text-base leading-relaxed font-medium" style={{ color: 'var(--ink)' }}>
                                    <Markdown content={intro} />
                                </p>
                            </div>
                        )}
                        <div className="space-y-4">
                            {findings.map((f, idx) => (
                                <div key={idx} className="flex items-start gap-4">
                                    <div className="shrink-0 w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold mt-1" style={{ background: 'var(--accent)', color: '#fff' }}>{idx + 1}</div>
                                    <div className="flex-1">
                                        {f.title && (
                                            <div className="font-semibold mb-1" style={{ color: 'var(--ink)' }}>
                                                <Markdown content={f.title} />
                                            </div>
                                        )}
                                        <div className="text-sm leading-relaxed" style={{ color: 'var(--ink-light)' }}>
                                            <Markdown content={f.text} />
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            /* B) What the Audits Agree On: each ### Pattern N renders with:
               - pattern title as h3
               - frequency line in red
               - tables/evidence/fix as default markdown */
            if (/^B\)?\s*What the Audits Agree/i.test(title)) {
                const parts = body.split(/\n(?=### )/g);
                return (
                    <div className="space-y-8">
                        {parts.map((part, idx) => {
                            const headerMatch = part.match(/^###\s+(.+)/);
                            if (!headerMatch) return <Markdown key={idx} content={part.trim()} />;
                            const subTitle = headerMatch[1].trim();
                            const subBody = part.slice(headerMatch[0].length).trim();
                            /* Detect first **Frequency:...** line and pull it out */
                            const lines = subBody.split('\n');
                            let freqLine = null;
                            let restStart = 0;
                            for (let i = 0; i < lines.length; i++) {
                                const ln = lines[i].trim();
                                if (/^\*\*Frequency:?\*\*/i.test(ln) || /^Frequency:/i.test(ln)) {
                                    freqLine = ln.replace(/^\*\*Frequency:?\*\*\s*/i, '').replace(/^Frequency:\s*/i, '').trim();
                                    restStart = i + 1;
                                    break;
                                }
                                if (ln !== '') break; // hit non-frequency content first → no frequency line
                            }
                            const restBody = lines.slice(restStart).join('\n').trim();
                            return (
                                <div key={idx}>
                                    <h3 className="text-base font-bold mb-1" style={{ color: 'var(--ink)' }}>{subTitle}</h3>
                                    {freqLine && (
                                        <p className="text-xs font-semibold mb-3" style={{ color: 'var(--danger)' }}>
                                            Frequency: <MdInline text={freqLine} />
                                        </p>
                                    )}
                                    <Markdown content={restBody} />
                                </div>
                            );
                        })}
                    </div>
                );
            }

            /* C) Inconsistencies & How to Resolve: each ### Contradiction N becomes
               a bordered card with structured tension/resolution + green callout for
               the recommendation. */
            if (/^C\)?\s*(Inconsistencies|What's Inconsistent|Contradictions)/i.test(title)) {
                const parts = body.split(/\n(?=### )/g);
                /* Extract a labeled field from body text. Captures content after
                   **Label:** up to the next bold label or end of string. */
                const extractField = (text, labels) => {
                    const allLabels = ['The tension', 'Tension', 'Resolution', 'Recommendation', 'Recommended Fix', 'Recommended', 'Fix'];
                    const labelPattern = labels.map(l => l.replace(/\s+/g, '\\s+')).join('|');
                    const nextLabelPattern = allLabels.filter(l => !labels.includes(l)).map(l => l.replace(/\s+/g, '\\s+')).join('|');
                    const re = new RegExp(`\\*\\*(?:${labelPattern}):?\\*\\*\\s*([\\s\\S]*?)(?=\\*\\*(?:${nextLabelPattern}):?\\*\\*|$)`, 'i');
                    const m = text.match(re);
                    return m ? m[1].trim().replace(/\s+/g, ' ') : null;
                };
                return (
                    <div className="space-y-5">
                        {parts.map((part, idx) => {
                            const headerMatch = part.match(/^###\s+(.+)/);
                            if (!headerMatch) {
                                const t = part.trim();
                                if (!t) return null;
                                return <Markdown key={idx} content={t} />;
                            }
                            const subTitle = headerMatch[1].trim();
                            const subBody = part.slice(headerMatch[0].length).trim();
                            const tension = extractField(subBody, ['The tension', 'Tension']);
                            const resolution = extractField(subBody, ['Resolution']);
                            const recommendation = extractField(subBody, ['Recommendation', 'Recommended Fix', 'Recommended', 'Fix']);
                            if (tension || resolution || recommendation) {
                                return (
                                    <div key={idx} className="rounded-lg border p-5" style={{ borderColor: 'var(--cloud)', background: 'white' }}>
                                        <h3 className="text-base font-bold mb-3" style={{ color: 'var(--ink)' }}>{subTitle}</h3>
                                        <div className="space-y-2 text-sm">
                                            {tension && (
                                                <p className="leading-relaxed" style={{ color: 'var(--ink-light)' }}>
                                                    <strong style={{ color: 'var(--ink)' }}>The tension:</strong> <MdInline text={tension} />
                                                </p>
                                            )}
                                            {resolution && (
                                                <p className="leading-relaxed" style={{ color: 'var(--ink-light)' }}>
                                                    <strong style={{ color: 'var(--ink)' }}>Resolution:</strong> <MdInline text={resolution} />
                                                </p>
                                            )}
                                            {recommendation && (
                                                <div className="rounded-lg p-3 mt-2" style={{ background: 'var(--success-light)' }}>
                                                    <p className="text-sm leading-relaxed" style={{ color: 'var(--ink-light)' }}>
                                                        <strong style={{ color: 'var(--success)' }}>Recommendation:</strong> <MdInline text={recommendation} />
                                                    </p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            }
                            return (
                                <div key={idx} className="rounded-lg border p-5" style={{ borderColor: 'var(--cloud)', background: 'white' }}>
                                    <h3 className="text-base font-bold mb-2" style={{ color: 'var(--ink)' }}>{subTitle}</h3>
                                    <Markdown content={subBody} />
                                </div>
                            );
                        })}
                    </div>
                );
            }

            /* H) Do/Don't Messaging Rules: ### DO (...) renders with green header,
               ### DON'T (...) with red header. */
            if (/^H\)?\s*Do\/Don/i.test(title) || /^H\)?\s*Do.*Don/i.test(title)) {
                const parts = body.split(/\n(?=### )/g);
                return (
                    <div className="space-y-6">
                        {parts.map((part, idx) => {
                            const headerMatch = part.match(/^###\s+(.+)/);
                            if (!headerMatch) {
                                const t = part.trim();
                                if (!t) return null;
                                return <Markdown key={idx} content={t} />;
                            }
                            const subTitle = headerMatch[1].trim();
                            const subBody = part.slice(headerMatch[0].length).trim();
                            const isDo = /^DO\b/i.test(subTitle) && !/^DON'?T/i.test(subTitle);
                            const isDont = /^DON'?T\b/i.test(subTitle);
                            const color = isDo ? 'var(--success)' : isDont ? 'var(--danger)' : 'var(--ink)';
                            return (
                                <div key={idx}>
                                    <h3 className="text-base font-bold uppercase tracking-wide mb-3" style={{ color }}>{subTitle}</h3>
                                    <Markdown content={subBody} />
                                </div>
                            );
                        })}
                    </div>
                );
            }

            /* Recommended Positioning: Core Positioning Statement = blue callout,
               Variant 1/2/3 each become a card with a small badge. */
            if (/^D\)?\s*Recommended Positioning/i.test(title)) {
                /* Split body by ### subheadings */
                const parts = body.split(/\n(?=### )/g);
                return (
                    <div className="space-y-5">
                        {parts.map((part, idx) => {
                            const headerMatch = part.match(/^###\s+(.+)/);
                            const subTitle = headerMatch ? headerMatch[1].trim() : '';
                            const subBody = headerMatch ? part.slice(headerMatch[0].length).trim() : part.trim();
                            if (!subTitle) {
                                return <Markdown key={idx} content={subBody} />;
                            }
                            const isCorePos = /Core Positioning|Positioning Statement/i.test(subTitle);
                            const variantMatch = subTitle.match(/^Variant\s*\d+/i);
                            if (isCorePos) {
                                return (
                                    <div key={idx} className="p-5 rounded-lg border-l-4" style={{ background: 'var(--accent-faint)', borderColor: 'var(--accent)' }}>
                                        <div className="text-xs font-bold uppercase tracking-wide mb-2" style={{ color: 'var(--accent)' }}>{subTitle}</div>
                                        <div className="text-base leading-relaxed" style={{ color: 'var(--ink)' }}>
                                            <Markdown content={subBody} />
                                        </div>
                                    </div>
                                );
                            }
                            if (variantMatch) {
                                /* Extract a badge from the title if it has a parenthetical descriptor */
                                const badgeMatch = subTitle.match(/^(Variant\s*\d+[^(]*)\(([^)]+)\)\s*$/i);
                                const variantLabel = badgeMatch ? badgeMatch[1].trim() : subTitle;
                                const badgeText = badgeMatch ? badgeMatch[2].trim() : null;
                                return (
                                    <div key={idx} className="rounded-lg border p-5" style={{ borderColor: 'var(--cloud)', background: 'white' }}>
                                        <div className="flex items-center gap-3 mb-3">
                                            <h3 className="text-base font-bold" style={{ color: 'var(--ink)' }}>{variantLabel}</h3>
                                            {badgeText && (
                                                <span className="text-xs font-semibold px-2.5 py-1 rounded-full" style={{ background: 'var(--accent-light)', color: 'var(--accent)' }}>{badgeText}</span>
                                            )}
                                        </div>
                                        <div className="text-sm leading-relaxed" style={{ color: 'var(--ink-light)' }}>
                                            <Markdown content={subBody} />
                                        </div>
                                    </div>
                                );
                            }
                            return (
                                <div key={idx}>
                                    <h3 className="text-base font-bold mb-2" style={{ color: 'var(--ink)' }}>{subTitle}</h3>
                                    <Markdown content={subBody} />
                                </div>
                            );
                        })}
                    </div>
                );
            }

            /* Messaging Pillars: ### Pillar N becomes a card with numbered circle. */
            if (/^F\)?\s*Messaging Pillars/i.test(title)) {
                const parts = body.split(/\n(?=### )/g);
                let pillarNum = 0;
                return (
                    <div className="space-y-5">
                        {parts.map((part, idx) => {
                            const headerMatch = part.match(/^###\s+(.+)/);
                            if (!headerMatch) return <Markdown key={idx} content={part.trim()} />;
                            const subTitle = headerMatch[1].trim();
                            const subBody = part.slice(headerMatch[0].length).trim();
                            if (/^Pillar\s*\d+/i.test(subTitle)) {
                                pillarNum++;
                                return (
                                    <div key={idx} className="rounded-lg border p-5" style={{ borderColor: 'var(--cloud)', background: 'white' }}>
                                        <div className="flex items-center gap-3 mb-3">
                                            <div className="shrink-0 w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold" style={{ background: 'var(--accent)', color: '#fff' }}>{pillarNum}</div>
                                            <h3 className="text-base font-bold" style={{ color: 'var(--ink)' }}>{subTitle.replace(/^Pillar\s*\d+:?\s*/i, '')}</h3>
                                        </div>
                                        <div className="text-sm leading-relaxed" style={{ color: 'var(--ink-light)' }}>
                                            <Markdown content={subBody} />
                                        </div>
                                    </div>
                                );
                            }
                            return (
                                <div key={idx}>
                                    <h3 className="text-base font-bold mb-2" style={{ color: 'var(--ink)' }}>{subTitle}</h3>
                                    <Markdown content={subBody} />
                                </div>
                            );
                        })}
                    </div>
                );
            }

            /* Final Diagnosis: wrap the whole section content in a red bordered box. */
            if (/^Final Diagnosis/i.test(title)) {
                return (
                    <div className="rounded-lg p-5 border-l-4" style={{ background: 'var(--danger-light)', borderColor: 'var(--danger)' }}>
                        <Markdown content={body} />
                    </div>
                );
            }

            /* E) ICP & Segmentation: detect Primary ICP paragraph and render in blue box.
               The Primary ICP is a bold paragraph directly after the '### Primary ICP' or similar heading. */
            if (/^E\)?\s*ICP/i.test(title)) {
                /* Find the Primary ICP block — bold paragraph after first ### */
                const lines = body.split('\n');
                const out = [];
                let i = 0;
                let inserted = false;
                while (i < lines.length) {
                    const line = lines[i];
                    /* Detect Primary ICP heading */
                    if (!inserted && /^###\s+Primary ICP/i.test(line)) {
                        out.push(line);
                        i++;
                        /* Skip blank lines */
                        while (i < lines.length && lines[i].trim() === '') { out.push(lines[i]); i++; }
                        /* Capture the next paragraph (until blank line or list start) */
                        const para = [];
                        while (i < lines.length && lines[i].trim() !== '' && !/^[#\-*>|]/.test(lines[i].trim())) {
                            para.push(lines[i]); i++;
                        }
                        if (para.length) {
                            out.push('__PRIMARY_ICP_BLOCK__' + para.join(' '));
                            inserted = true;
                        }
                    } else {
                        out.push(line); i++;
                    }
                }
                const processed = out.join('\n');
                /* Now render: split by the marker to insert a custom blue box */
                const segments = processed.split('__PRIMARY_ICP_BLOCK__');
                if (segments.length === 2) {
                    const [pre, restWithIcp] = segments;
                    const nl = restWithIcp.indexOf('\n');
                    const icp = nl >= 0 ? restWithIcp.slice(0, nl) : restWithIcp;
                    const rest = nl >= 0 ? restWithIcp.slice(nl + 1) : '';
                    return (
                        <div>
                            <Markdown content={pre} />
                            <div className="p-5 rounded-lg border-l-4 my-4" style={{ background: 'var(--accent-faint)', borderColor: 'var(--accent)' }}>
                                <div className="text-base leading-relaxed font-medium" style={{ color: 'var(--ink)' }}>
                                    <Markdown content={icp} />
                                </div>
                            </div>
                            <Markdown content={rest} />
                        </div>
                    );
                }
                return <Markdown content={body} />;
            }

            /* G) Offer & CTA Direction: the Primary Offer line gets a green callout box. */
            if (/^G\)?\s*Offer/i.test(title)) {
                /* Look for '### Primary Offer' then the next paragraph wrapping. */
                const m = body.match(/(###\s+Primary Offer[^\n]*\n)((?:\n*(?:[^\n#]|\n(?!#))*)+?)(?=\n###|\n##|\Z)/i);
                if (m) {
                    const pre = body.slice(0, m.index);
                    const headerLine = m[1];
                    const para = m[2].trim();
                    const post = body.slice(m.index + m[0].length);
                    return (
                        <div>
                            <Markdown content={pre} />
                            <h3 className="text-base font-bold mt-4 mb-2" style={{ color: 'var(--ink)' }}>{headerLine.replace(/^###\s+/, '').trim()}</h3>
                            <div className="p-5 rounded-lg border-l-4 my-2" style={{ background: 'var(--success-light)', borderColor: 'var(--success)' }}>
                                <div className="text-base leading-relaxed font-medium" style={{ color: 'var(--ink)' }}>
                                    <Markdown content={para} />
                                </div>
                            </div>
                            <Markdown content={post} />
                        </div>
                    );
                }
                return <Markdown content={body} />;
            }

            /* I) Next Actions: numbered list items become blue circles + Day badges.
               Tables remain as default markdown. */
            if (/^I\)?\s*Next\s+\d+\s+Actions/i.test(title)) {
                /* Split body into chunks: H3 subheadings keep, OL items get circle treatment */
                const lines = body.split('\n');
                const out = [];
                const itemRegex = /^(\d+)\.\s+\*\*(.+?)\*\*\s*(.*)$/;
                let i = 0;
                while (i < lines.length) {
                    const line = lines[i];
                    const m = line.match(itemRegex);
                    if (m) {
                        /* Found a numbered action item with bold title */
                        const num = parseInt(m[1], 10);
                        let titleStr = m[2];
                        let restStr = m[3];
                        /* Pull subsequent indented/continuation lines into restStr until next numbered item or blank */
                        i++;
                        while (i < lines.length && !itemRegex.test(lines[i]) && !/^#/.test(lines[i]) && lines[i].trim() !== '') {
                            restStr += ' ' + lines[i].trim();
                            i++;
                        }
                        /* Extract any "Day X" or "(Day X)" or "(This week)" markers from the text */
                        let dayBadge = null;
                        const dayMatch = restStr.match(/\((Day\s*\d+(?:-\d+)?|This week|Next week|Same week|Day\s*\d+\/\d+)\)/i) || restStr.match(/\b(Day\s*\d+(?:-\d+)?)\b/i);
                        if (dayMatch) {
                            dayBadge = dayMatch[1];
                            restStr = restStr.replace(dayMatch[0], '').replace(/\s+/g, ' ').trim();
                        }
                        out.push({ kind: 'item', num, title: titleStr, body: restStr, badge: dayBadge });
                    } else if (/^###\s+/.test(line)) {
                        out.push({ kind: 'h3', text: line.replace(/^###\s+/, '').trim() });
                        i++;
                    } else if (/^##\s+/.test(line)) {
                        out.push({ kind: 'h2', text: line.replace(/^##\s+/, '').trim() });
                        i++;
                    } else if (line.includes('|') && i + 1 < lines.length && /^\s*\|?[\s\-|:]+\|?\s*$/.test(lines[i+1])) {
                        /* Collect table block */
                        const tbl = [line];
                        i++;
                        while (i < lines.length && lines[i].includes('|') && lines[i].trim() !== '') {
                            tbl.push(lines[i]); i++;
                        }
                        out.push({ kind: 'md', text: tbl.join('\n') });
                    } else {
                        out.push({ kind: 'raw', text: line });
                        i++;
                    }
                }
                /* Render */
                let elements = [];
                let mdBuffer = [];
                const flushMd = () => {
                    if (mdBuffer.length) {
                        elements.push(<Markdown key={'md-' + elements.length} content={mdBuffer.join('\n')} />);
                        mdBuffer = [];
                    }
                };
                for (const part of out) {
                    if (part.kind === 'item') {
                        flushMd();
                        elements.push(
                            <div key={'item-' + elements.length} className="flex items-start gap-4 my-3">
                                <div className="shrink-0 w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold mt-0.5" style={{ background: 'var(--accent)', color: '#fff' }}>{part.num}</div>
                                <div className="flex-1">
                                    <div className="flex items-center gap-2 flex-wrap">
                                        <span className="font-semibold text-sm" style={{ color: 'var(--ink)' }}>
                                            <Markdown content={part.title} />
                                        </span>
                                        {part.badge && (
                                            <span className="text-xs font-semibold px-2 py-0.5 rounded" style={{ background: 'var(--warning-light)', color: 'var(--warning)' }}>{part.badge}</span>
                                        )}
                                    </div>
                                    {part.body && (
                                        <div className="text-sm mt-1" style={{ color: 'var(--ink-light)' }}>
                                            <Markdown content={part.body} />
                                        </div>
                                    )}
                                </div>
                            </div>
                        );
                    } else if (part.kind === 'h2') {
                        flushMd();
                        elements.push(<h2 key={'h2-' + elements.length} className="text-lg font-bold mt-6 mb-2" style={{ color: 'var(--ink)' }}>{part.text}</h2>);
                    } else if (part.kind === 'h3') {
                        flushMd();
                        elements.push(<h3 key={'h3-' + elements.length} className="text-base font-semibold mt-5 mb-2" style={{ color: 'var(--ink)' }}>{part.text}</h3>);
                    } else if (part.kind === 'md') {
                        mdBuffer.push(part.text);
                    } else {
                        mdBuffer.push(part.text);
                    }
                }
                flushMd();
                return <div>{elements}</div>;
            }

            /* Default: just render the body as markdown. */
            return <Markdown content={body} />;
        };

        /* Rich card-based audit view — renders pre-parsed structured audit data
           in the exact visual style the AdRoast tool generates after running an audit
           (Nudge-style polish: tailwind colors, score badges, paneled sections). */
        const RichAuditView = ({ audit }) => {
            const p = audit.parsed;
            if (!p) return null;
            const lpAvg = p.lp_roast ? Math.round((
                (p.lp_roast.headline?.score || 0) +
                (p.lp_roast.value_prop?.score || 0) +
                (p.lp_roast.cta?.score || 0) +
                (p.lp_roast.trust?.score || 0)
            ) / 4) : 0;
            const lpFeedback = p.lp_roast?.headline?.text || (lpAvg === 0 ? 'No landing page feedback' : '');
            return (
                <div className="space-y-6">
                    {/* Target Audience */}
                    {p.icp_match && (
                        <div style={{ backgroundColor: '#e8f3ff', borderColor: '#b4d4ff' }} className="border rounded-lg p-3">
                            <p className="text-sm text-gray-900"><span className="font-semibold">Target Audience:</span> {p.icp_match.text}</p>
                        </div>
                    )}

                    {/* Scores */}
                    <div className="grid md:grid-cols-3 gap-4">
                        <div className={`bg-white rounded-lg border ${p.overall_score?.score != null ? getScoreBorder(p.overall_score.score) : 'border-gray-200'} shadow-sm p-4`}>
                            <div className="flex items-center justify-between mb-2">
                                <span className="text-sm font-semibold text-gray-500">Ad Score</span>
                                <span className={`text-2xl font-bold ${p.overall_score?.score != null ? getScoreText(p.overall_score.score) : 'text-gray-400'}`}>{p.overall_score?.score != null ? `${p.overall_score.score}/10` : 'N/A'}</span>
                            </div>
                            <p className="text-sm text-gray-700">{p.overall_score?.text}</p>
                        </div>
                        <div className={`bg-white rounded-lg border ${lpAvg > 0 ? getScoreBorder(lpAvg) : 'border-gray-200'} shadow-sm p-4`}>
                            <div className="flex items-center justify-between mb-2">
                                <span className="text-sm font-semibold text-gray-500">Landing Page</span>
                                <span className={`text-2xl font-bold ${lpAvg > 0 ? getScoreText(lpAvg) : 'text-gray-400'}`}>{lpAvg > 0 ? `${lpAvg}/10` : 'N/A'}</span>
                            </div>
                            <p className="text-sm text-gray-700">{lpFeedback}</p>
                        </div>
                        <div className={`bg-white rounded-lg border ${p.mismatch?.alignment_score ? getScoreBorder(p.mismatch.alignment_score) : 'border-gray-200'} shadow-sm p-4`}>
                            <div className="flex items-center justify-between mb-2">
                                <span className="text-sm font-semibold text-gray-500">Ad{'↔'}LP Match</span>
                                <span className={`text-2xl font-bold ${p.mismatch?.alignment_score ? getScoreText(p.mismatch.alignment_score) : 'text-gray-400'}`}>{p.mismatch?.alignment_score ? `${p.mismatch.alignment_score}/10` : 'N/A'}</span>
                            </div>
                            <p className="text-sm text-gray-700">{p.mismatch?.verdict}</p>
                        </div>
                    </div>

                    {/* Ad Issues */}
                    {p.ad_issues?.length > 0 && (
                        <div className="bg-white rounded-lg border border-gray-200 shadow-sm">
                            <div className="px-4 py-3 border-b border-gray-200"><h2 className="font-semibold text-gray-900">Ad Issues</h2></div>
                            <div className="p-4 grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
                                {p.ad_issues.map((issue, i) => (
                                    <div key={i} className="p-3 bg-gray-50 rounded-lg border border-gray-200">
                                        <div className="flex items-start justify-between mb-2 gap-2">
                                            <span className="font-semibold text-sm text-gray-900">{issue.title}</span>
                                            <span className={`shrink-0 px-2 py-0.5 rounded text-xs font-bold ${issue.score != null ? getScoreColor(issue.score) : 'text-gray-500 bg-gray-100'}`}>{issue.score != null ? `${issue.score}/10` : 'N/A'}</span>
                                        </div>
                                        <p className="text-sm text-gray-600">{issue.text || '—'}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Message Mismatch */}
                    {p.mismatch?.disconnects?.length > 0 && (
                        <div className="bg-white rounded-lg border border-amber-300 shadow-sm overflow-hidden">
                            <div className="px-4 py-3 border-b border-amber-200 bg-amber-50">
                                <h2 className="font-semibold text-amber-800 flex items-center gap-2">{'📎'} Message Mismatch</h2>
                            </div>
                            <div className="p-4">
                                {p.mismatch.verdict && <p className="text-sm text-gray-800 mb-3">{p.mismatch.verdict}</p>}
                                {p.mismatch.message_match && <p className="text-sm text-gray-600 mb-4 italic">{p.mismatch.message_match}</p>}

                            <div className="rounded-xl border-2 border-dashed p-6 flex flex-col items-center justify-center text-center min-h-[180px]" style={{ borderColor: 'var(--cloud)' }}>

                    {/* Direct Client Workspaces section */}
                    <section>
                        <div className="flex items-center justify-between mb-6">

                        {directCount === 0 ? (

        /* ============================================================
           PARTNER WORKSPACE  /portal/partner-workspaces/{partnerId}
           ============================================================ */
        const PartnerWorkspace = ({ partnerId, onNavigate, accessMode }) => {
            const partner = portalData.partners[partnerId];
            if (!partner) return null;
            const clientEntries = Object.entries(partner.clients);

            const crumbs = accessMode === 'master'

                    <div className="mb-10">

                                    <div className="w-10 h-10 rounded-lg flex items-center justify-center mb-4" style={{ background: 'var(--accent-light)' }}>
                                        <svg className="w-5 h-5" style={{ color: 'var(--accent)' }} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
                                    </div>
                                    <h3 className="text-lg font-semibold mb-1 group-hover:text-blue-700 transition-colors" style={{ color: 'var(--ink)' }}>{client.name}</h3>
                                    <p className="text-sm mb-3 leading-relaxed" style={{ color: 'var(--slate)' }}>{client.description}</p>
                                    <div className="flex items-center justify-between">

                                        <span className="inline-flex items-center text-sm font-medium" style={{ color: 'var(--accent)' }}>Open<ChevronRight /></span>
                                    </div>
                                </div>
                            );
                        })}

                        {/* Scalability placeholder */}
                        <div className="rounded-xl border-2 border-dashed p-6 flex flex-col items-center justify-center text-center min-h-[180px]" style={{ borderColor: 'var(--cloud)' }}>
                            <div className="w-10 h-10 rounded-full flex items-center justify-center mb-3" style={{ background: 'var(--cloud)' }}>
                                <svg className="w-5 h-5" style={{ color: 'var(--slate)' }} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>
                            </div>
                            <p className="text-sm font-medium" style={{ color: 'var(--slate)' }}>Additional client spaces</p>
                            <p className="text-xs mt-1" style={{ color: 'var(--slate)', opacity: 0.7 }}>New clients will appear here</p>
                        </div>
                    </div>
                </PageShell>
            );
        };

        /* ============================================================
           CLIENT HUB  /portal/partner-workspaces/{partnerId}/{clientId}
           ============================================================ */
        const ClientHub = ({ partnerId, clientId, onNavigate, accessMode }) => {
            const { partner, client } = resolvePortalClient(partnerId, clientId);
            if (!client) return null;

            const crumbs = accessMode === 'master'
                ? (partner
                    ? [
                        { label: 'Portal', onClick: () => onNavigate('portal-root') },
                        { label: partner.name, onClick: () => onNavigate('partner-workspace', partnerId) },
                        { label: client.name }
                    ]
                    : [
                        { label: 'Portal', onClick: () => onNavigate('portal-root') },
                        { label: client.name }
                    ])
                : accessMode === 'partner'
                ? [
                    { label: partner.name, onClick: () => onNavigate('partner-workspace', partnerId) },
                    { label: client.name }
                ]
                : [{ label: client.name }];

            return (
                <PageShell crumbs={crumbs} onNavigate={onNavigate}>
                    {accessMode !== 'client' && (partner
                        ? <BackButton label={`Back to ${partner.name}`} onClick={() => onNavigate('partner-workspace', partnerId)} />
                        : <BackButton label="Back to Portal" onClick={() => onNavigate('portal-root')} />)}
                    <div className="mb-10">
                        <h1 className="text-3xl sm:text-4xl font-bold mb-3 serif" style={{ color: 'var(--ink)' }}>{client.name}</h1>
                        <p className="text-lg" style={{ color: 'var(--slate)' }}>{client.description}</p>
                    </div>

                    {/* Primary deliverable */}
                    <section className="mb-14">
                        <h2 className="text-xl font-semibold mb-5 serif" style={{ color: 'var(--ink)' }}>Primary Deliverable</h2>
                        <div onClick={() => onNavigate('positioning', partnerId, clientId)}
                            className="rounded-xl p-7 sm:p-8 cursor-pointer transition-all hover:shadow-xl card-lift text-white"
                            style={{ background: 'linear-gradient(135deg, var(--accent) 0%, #1a3fa0 100%)' }}>
                            <span className="inline-block px-3 py-1 text-xs font-semibold rounded-full tracking-wide uppercase" style={{ background: 'rgba(255,255,255,0.18)', color: '#fff', border: '1px solid rgba(255,255,255,0.35)' }}>Strategic Analysis</span>
                            <h3 className="text-2xl sm:text-3xl font-bold mt-4 mb-3 serif">{client.positioning.title}</h3>
                            <p className="text-blue-100 leading-relaxed mb-6 max-w-2xl">{client.positioning.summary}</p>
                            <span className="inline-flex items-center px-5 py-2.5 bg-white font-semibold text-sm rounded-lg transition-colors" style={{ color: 'var(--accent)' }}>
                                Read Full Report<ChevronRight />
                            </span>
                        </div>
                    </section>

                    {/* Supporting audits */}
                    <section>
                        <h2 className="text-xl font-semibold mb-2 serif" style={{ color: 'var(--ink)' }}>Supporting Analysis</h2>
                        <p className="text-sm mb-6" style={{ color: 'var(--slate)' }}>Individual campaign audits that inform the strategic recommendations</p>
                        <div className="grid gap-5 sm:grid-cols-2 lg:grid-cols-3">
                            {Object.entries(client.audits).map(([aid, audit]) => (
                                <div key={aid} onClick={() => onNavigate('audit', partnerId, clientId, aid)}
                                    className="bg-white rounded-xl border p-5 cursor-pointer card-lift group" style={{ borderColor: 'var(--cloud)' }}>
                                    <div className="flex items-center justify-between mb-3">
                                        <Badge>Audit {aid}</Badge>
                                        <svg className="h-4 w-4 transition-colors" style={{ color: 'var(--slate)' }} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>
                                    </div>
                                    <h3 className="text-base font-semibold mb-2 group-hover:text-blue-700 transition-colors leading-snug" style={{ color: 'var(--ink)' }}>{audit.title}</h3>
                                    <p className="text-sm leading-relaxed" style={{ color: 'var(--slate)' }}>{audit.summary}</p>
                                </div>
                            ))}
                        </div>
                    </section>
                </PageShell>
            );
        };

        /* ============================================================
           POSITIONING REPORT (dedicated on-page report)
           ============================================================ */
        const PositioningReportPage = ({ partnerId, clientId, onNavigate, accessMode }) => {
            const { partner, client } = resolvePortalClient(partnerId, clientId);
            const [openSections, setOpenSections] = useState({});
            /* Live-fetched synthesis content when this client uses a synthId
               (single source of truth shared with the public ?synth= URL). */
            const [fetchedSynth, setFetchedSynth] = useState(null);
            const [fetchedSynthError, setFetchedSynthError] = useState(null);
            const synthIdToFetch = client.positioning && client.positioning.synthId;
            /* Permalink for the synthesis report. We sync the address bar to this URL
               while the report is visible so the user can copy it from the navigator
               directly (no separate copy banner needed). */
            const synthShareUrl = synthIdToFetch
                ? `${window.location.origin}/?synth=${synthIdToFetch}`
                : null;
            useEffect(() => {
                if (!synthShareUrl) return;
                try {
                    const u = new URL(synthShareUrl, window.location.origin);
                    const target = u.pathname + u.search + u.hash;
                    if (window.location.pathname + window.location.search + window.location.hash !== target) {
                        window.history.replaceState(null, '', target);
                    }
                } catch (e) { /* ignore */ }
            }, [synthShareUrl]);
            useEffect(() => {
                if (!synthIdToFetch) return;
                let cancelled = false;
                fetch(`/api/synthesize?id=${encodeURIComponent(synthIdToFetch)}`)
                    .then(r => r.ok ? r.json() : Promise.reject(new Error('HTTP ' + r.status)))
                    .then(d => { if (!cancelled) setFetchedSynth(d); })
                    .catch(e => { if (!cancelled) setFetchedSynthError(e.message); });
                return () => { cancelled = true; };
            }, [synthIdToFetch]);

            /* Build the markdown content from synthId fetch (preferred) or fullContent fallback. */
            const liveMarkdown = fetchedSynth && fetchedSynth.markdown;
            const useFullContent = client.positioning && (liveMarkdown || client.positioning.fullContent);

            /* Loading state while we fetch from synthId. */
            if (synthIdToFetch && !fetchedSynth && !fetchedSynthError) {
                return (
                    <PageShell onNavigate={onNavigate}>
                        <div className="max-w-3xl mx-auto py-16 text-center">
                            <div className="inline-block w-6 h-6 rounded-full border-2 animate-spin" style={{ borderColor: 'var(--cloud)', borderTopColor: 'var(--accent)' }}></div>
                            <p className="text-sm mt-4" style={{ color: 'var(--slate)' }}>Loading synthesis…</p>
                        </div>
                    </PageShell>
                );
            }
            /* Error state: the fetch failed and there's no fullContent fallback. */
            if (synthIdToFetch && fetchedSynthError && !client.positioning?.fullContent) {
                return (
                    <PageShell onNavigate={onNavigate}>
                        <div className="max-w-3xl mx-auto py-16">
                            <BackButton label={`Back to ${client.name} Hub`} onClick={() => onNavigate('client-hub', partnerId, clientId)} />
                            <div className="rounded-lg p-5 border" style={{ background: 'var(--danger-light)', borderColor: 'var(--danger)' }}>
                                <p className="text-sm" style={{ color: 'var(--ink)' }}>Couldn't load the synthesis report. ({fetchedSynthError})</p>
                            </div>
                        </div>
                    </PageShell>
                );
            }

            /* Runtime safety net: scrub charged/sensationalist words from synthesis
               content (same list as the public viewer). Protects against stale stored
               content the user hasn't regenerated yet. */
            const scrubChargedLanguage = (text) => {
                if (!text || typeof text !== 'string') return text;
                const replacements = [
                    [/\bschizophrenic\b/gi, 'inconsistent'],
                    [/\bhemorrhaging\b/gi, 'losing'],
                    [/\bhemorrhage(s|d)?\b/gi, (_, s) => 'lose' + (s === 's' ? 's' : s === 'd' ? 'd' : '')],
                    [/\bbipolar\b/gi, 'inconsistent'],
                    [/\bcancer\b/gi, 'problem'],
                    [/\binsane\b/gi, 'extreme'],
                    [/\bcrazy\b/gi, 'extreme'],
                    [/\bpsycho\b/gi, 'irrational'],
                    [/\bmanic\b/gi, 'frantic'],
                    [/\banxiety-inducing\b/gi, 'stressful'],
                    [/\bweaponize\b/gi, 'leverage'],
                    [/\bnuclear\b/gi, 'severe']
                ];
                let out = text;
                for (const [re, sub] of replacements) out = out.replace(re, sub);
                return out;
            };

            /* If this client has live-fetched synth content OR fullContent markdown, render via the rich path. */
            if (useFullContent) {
                const crumbs = accessMode === 'master'
                    ? (partner ? [
                        { label: 'Portal', onClick: () => onNavigate('portal-root') },
                        { label: partner.name, onClick: () => onNavigate('partner-workspace', partnerId) },
                        { label: client.name, onClick: () => onNavigate('client-hub', partnerId, clientId) },
                        { label: 'Positioning Report' }
                    ] : [
                        { label: 'Portal', onClick: () => onNavigate('portal-root') },
                        { label: client.name, onClick: () => onNavigate('client-hub', partnerId, clientId) },
                        { label: 'Positioning Report' }
                    ])
                    : accessMode === 'partner'
                    ? [
                        { label: partner.name, onClick: () => onNavigate('partner-workspace', partnerId) },
                        { label: client.name, onClick: () => onNavigate('client-hub', partnerId, clientId) },
                        { label: 'Positioning Report' }
                    ]
                    : [
                        { label: client.name, onClick: () => onNavigate('client-hub', partnerId, clientId) },
                        { label: 'Positioning Report' }
                    ];
                /* Parse content into sections by H2 headers. Each section becomes a collapsible block.
                   The TOC at the top links to each section.
                   Prefer the live-fetched synthesis content (synthId) over hardcoded fullContent.
                   Scrub charged language before parsing. */
                const raw = scrubChargedLanguage(liveMarkdown || client.positioning.fullContent);
                /* Parse Prepared for/Date/Prepared by metadata anywhere in the markdown
                   and render it as the metadata line under H1 (matches Nudge). */
                const parseMeta = (text) => {
                    const meta = {};
                    const re = /\*\*(Prepared for|Date|Prepared by):\*\*\s*([^\n]+)/gi;
                    let m;
                    while ((m = re.exec(text)) !== null) {
                        const key = m[1].toLowerCase().replace(/\s+/g, '');
                        meta[key] = m[2].trim();
                    }
                    return meta;
                };
                const meta = parseMeta(raw);
                // Strip the leading H1 + frontmatter (everything up to first ## )
                const trimmed = raw.replace(/^[\s\S]*?(?=\n## )/, '').trim();
                /* Drop leading numeric prefixes (e.g., "1) A) Executive Summary" → "A) Executive Summary"). */
                const cleanTitle = (t) => t.replace(/^\d+\)\s*/, '').trim();
                /* Detect sections whose body is empty or only metadata lines — drop those
                   from the rendered TOC + collapsibles. */
                const META_RE_PORTAL = /^\*\*(Prepared for|Date|Prepared by):\*\*/i;
                const isMetaOnly = (body) => {
                    const lines = body.split('\n').map(l => l.trim()).filter(l => l !== '' && l !== '---');
                    if (lines.length === 0) return true;
                    return lines.every(l => META_RE_PORTAL.test(l));
                };
                // Split into sections at H2 boundaries
                const sectionRe = /^## (.+)$/gm;
                const rawSections = [];
                let match;
                let lastIdx = 0;
                let lastTitle = null;
                while ((match = sectionRe.exec(trimmed)) !== null) {
                    if (lastTitle !== null) {
                        rawSections.push({
                            title: cleanTitle(lastTitle),
                            body: trimmed.slice(lastIdx, match.index).trim()
                        });
                    }
                    lastTitle = match[1].trim();
                    lastIdx = match.index + match[0].length;
                }
                if (lastTitle !== null) {
                    rawSections.push({ title: cleanTitle(lastTitle), body: trimmed.slice(lastIdx).trim() });
                }
                const sections = rawSections.filter(s => s.body && s.body.length > 0 && !isMetaOnly(s.body));
                const slug = (s) => s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
                return (
                    <PageShell crumbs={crumbs} onNavigate={onNavigate}>
                        <div className="max-w-3xl mx-auto">
                            <BackButton label={`Back to ${client.name} Hub`} onClick={() => onNavigate('client-hub', partnerId, clientId)} />
                            <Badge>Strategic Analysis</Badge>
                            <h1 className="text-3xl sm:text-4xl font-bold mt-4 mb-2 serif" style={{ color: 'var(--ink)' }}>{client.positioning.title}</h1>
                            {(meta.preparedfor || meta.date || meta.preparedby) ? (
                                <div className="flex flex-wrap gap-x-6 gap-y-1 text-sm mt-3 mb-6" style={{ color: 'var(--slate)' }}>
                                    {meta.preparedfor && <span><strong style={{ color: 'var(--ink-light)' }}>Prepared for:</strong> {meta.preparedfor}</span>}
                                    {meta.date && <span><strong style={{ color: 'var(--ink-light)' }}>Date:</strong> {meta.date}</span>}
                                    {meta.preparedby && <span><strong style={{ color: 'var(--ink-light)' }}>Prepared by:</strong> {meta.preparedby}</span>}
                                </div>
                            ) : (
                                <p className="text-lg mb-6" style={{ color: 'var(--slate)' }}>{client.positioning.subtitle}</p>
                            )}
                            <div className="mb-2"></div>
                            {/* TOC card — same Nudge styling as the synthesis viewer:
                                white background, rounded-xl, uppercase tracking-wider header,
                                row-flow grid. Sits OUTSIDE the main report card. */}
                            {sections.length > 0 && (
                                <div className="rounded-xl border p-5 mb-10" style={{ background: '#fff', borderColor: 'var(--cloud)' }}>
                                    <p className="text-xs font-semibold uppercase tracking-wider mb-3" style={{ color: 'var(--slate)' }}>Report Sections</p>
                                    <div className="grid sm:grid-cols-2 gap-x-6 gap-y-1.5 text-sm">
                                        {sections.map((s, i) => (
                                            <a key={i} href={`#${slug(s.title)}`}
                                                onClick={(e) => {
                                                    e.preventDefault();
                                                    setOpenSections(prev => ({ ...prev, [slug(s.title)]: true }));
                                                    setTimeout(() => {
                                                        const el = document.getElementById(slug(s.title));
                                                        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                                                    }, 50);
                                                }}
                                                className="text-left hover:underline" style={{ color: 'var(--accent)' }}>{s.title}</a>
                                        ))}
                                    </div>
                                </div>
                            )}
                            <div className="bg-white rounded-xl border overflow-hidden" style={{ borderColor: 'var(--cloud)' }}>
                                <div className="p-6 sm:p-8 space-y-14">
                                    {/* Collapsible sections — with Nudge-style enhancements per section type */}
                                    {sections.map((s, i) => {
                                        const sid = slug(s.title);
                                        const open = openSections[sid] !== false; // default open
                                        return (
                                            <section key={i} id={sid}>
                                                <button onClick={() => setOpenSections(prev => ({ ...prev, [sid]: !open }))}
                                                    className="w-full flex items-center justify-between py-1 group bg-transparent border-0 cursor-pointer text-left">
                                                    <h2 className="text-2xl font-semibold serif" style={{ color: 'var(--ink)' }}>{s.title}</h2>
                                                    <svg className={`w-5 h-5 transition-transform flex-shrink-0 ml-4 ${open ? 'rotate-180' : ''}`} style={{ color: 'var(--slate)' }} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                                                    </svg>
                                                </button>
                                                {open && (
                                                    <div className="mt-5">
                                                        <NudgeStyleSection title={s.title} body={s.body} />
                                                    </div>
                                                )}
                                            </section>
                                        );
                                    })}
                                </div>
                                <ContentNav current="positioning" partnerId={partnerId} clientId={clientId} onNavigate={onNavigate} />
                            </div>
                        </div>
                    </PageShell>
                );
            }

            const toggleSection = (id) => setOpenSections(prev => ({ ...prev, [id]: !prev[id] }));
            const isOpen = (id) => openSections[id] !== false; // default open

            const crumbs = accessMode === 'master'
                ? [
                    { label: 'Portal', onClick: () => onNavigate('portal-root') },
                    { label: partner.name, onClick: () => onNavigate('partner-workspace', partnerId) },
                    { label: client.name, onClick: () => onNavigate('client-hub', partnerId, clientId) },
                    { label: 'Positioning Report' }
                ]
                : accessMode === 'partner'
                ? [
                    { label: partner.name, onClick: () => onNavigate('partner-workspace', partnerId) },
                    { label: client.name, onClick: () => onNavigate('client-hub', partnerId, clientId) },
