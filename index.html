        /* ============================================================
           PORTAL ROOT  /portal
           ============================================================ */
        const PortalRoot = ({ onNavigate }) => {
            const partnerCount = Object.keys(portalData.partners).length;
            const directCount = Object.keys(portalData.directClients).length;

            return (
                <PageShell crumbs={[{ label: 'Portal' }]} onNavigate={onNavigate}>
                    <div className="mb-12">
                        <h1 className="text-3xl sm:text-4xl font-bold mb-3 serif" style={{ color: 'var(--ink)' }}>Protected Workspace for Strategic Consulting Deliverables</h1>
                        <p className="text-lg" style={{ color: 'var(--slate)' }}>Private access to client specific assets and reports</p>
                    </div>

                    {/* Partner Workspaces section */}
                    <section className="mb-14">
                        <div className="flex items-center justify-between mb-6">
                            <h2 className="text-xl font-semibold serif" style={{ color: 'var(--ink)' }}>Partner Workspaces</h2>
                            <span className="text-xs font-medium px-2.5 py-1 rounded-full" style={{ background: 'var(--cloud)', color: 'var(--slate)' }}>{partnerCount} {partnerCount === 1 ? 'partner' : 'partners'}</span>
                        </div>
                        <div className="grid gap-5 sm:grid-cols-2 lg:grid-cols-3">
                            {Object.entries(portalData.partners).map(([pid, partner]) => (
                                <div key={pid} onClick={() => onNavigate('partner-workspace', pid)}
                                    className="bg-white rounded-xl border p-6 cursor-pointer card-lift group"
                                    style={{ borderColor: 'var(--cloud)' }}
                                >
                                    <div className="w-10 h-10 rounded-lg flex items-center justify-center mb-4" style={{ background: 'var(--accent-light)' }}>
                                        <svg className="w-5 h-5" style={{ color: 'var(--accent)' }} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                                    </div>
                                    <h3 className="text-lg font-semibold mb-1 group-hover:text-blue-700 transition-colors" style={{ color: 'var(--ink)' }}>{partner.name}</h3>
                                    <p className="text-sm mb-4 leading-relaxed" style={{ color: 'var(--slate)' }}>{partner.description}</p>
                                    <span className="inline-flex items-center text-sm font-medium" style={{ color: 'var(--accent)' }}>
                                        Open workspace<ChevronRight />
                                    </span>
                                </div>
                            ))}

                            {/* Placeholder for future partners */}
                            <div className="rounded-xl border-2 border-dashed p-6 flex flex-col items-center justify-center text-center min-h-[180px]" style={{ borderColor: 'var(--cloud)' }}>
                                <div className="w-10 h-10 rounded-full flex items-center justify-center mb-3" style={{ background: 'var(--cloud)' }}>
                                    <svg className="w-5 h-5" style={{ color: 'var(--slate)' }} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>
                                </div>
                                <p className="text-sm font-medium" style={{ color: 'var(--slate)' }}>Additional partner workspaces</p>
                                <p className="text-xs mt-1" style={{ color: 'var(--slate)', opacity: 0.7 }}>New partners will appear here</p>
                            </div>
                        </div>
                    </section>

                    {/* Direct Client Workspaces section */}
                    <section>
                        <div className="flex items-center justify-between mb-6">
                            <h2 className="text-xl font-semibold serif" style={{ color: 'var(--ink)' }}>Client Workspaces</h2>
                            <span className="text-xs font-medium px-2.5 py-1 rounded-full" style={{ background: 'var(--cloud)', color: 'var(--slate)' }}>{directCount} {directCount === 1 ? 'client' : 'clients'}</span>
                        </div>
                        {directCount === 0 ? (
                            <div className="rounded-xl border-2 border-dashed p-8 text-center" style={{ borderColor: 'var(--cloud)' }}>
                                <p className="text-sm" style={{ color: 'var(--slate)' }}>Direct client workspaces will appear here as they are added.</p>
                            </div>
                        ) : (
                            <div className="grid gap-5 sm:grid-cols-2 lg:grid-cols-3">
                                {Object.entries(portalData.directClients).map(([cid, client]) => (
                                    <div key={cid} onClick={() => onNavigate('client-workspace-hub', cid)}
                                        className="bg-white rounded-xl border p-6 cursor-pointer card-lift group" style={{ borderColor: 'var(--cloud)' }}>
                                        <div className="w-10 h-10 rounded-lg flex items-center justify-center mb-4" style={{ background: 'var(--accent-light)' }}>
                                            <svg className="w-5 h-5" style={{ color: 'var(--accent)' }} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
                                        </div>
                                        <h3 className="text-lg font-semibold mb-1 group-hover:text-blue-700 transition-colors" style={{ color: 'var(--ink)' }}>{client.name}</h3>
                                        <p className="text-sm mb-4 leading-relaxed" style={{ color: 'var(--slate)' }}>{client.description}</p>
                                        <span className="inline-flex items-center text-sm font-medium" style={{ color: 'var(--accent)' }}>Open workspace<ChevronRight /></span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </section>
                </PageShell>
            );
        };

        /* ============================================================
           PARTNER WORKSPACE  /portal/partner-workspaces/{partnerId}
           ============================================================ */
        const PartnerWorkspace = ({ partnerId, onNavigate, accessMode }) => {
            const partner = portalData.partners[partnerId];
            if (!partner) return null;
            const clientEntries = Object.entries(partner.clients);

            const crumbs = accessMode === 'master'
                ? [
                    { label: 'Portal', onClick: () => onNavigate('portal-root') },
                    { label: 'Partner Workspaces', onClick: () => onNavigate('portal-root') },
                    { label: partner.name }
                ]
                : [{ label: partner.name }];

            return (
                <PageShell crumbs={crumbs} onNavigate={accessMode === 'master' ? onNavigate : undefined}>
                    {accessMode === 'master' && <BackButton label="Back to Portal" onClick={() => onNavigate('portal-root')} />}
                    <div className="mb-10">
                        <Badge>Partner workspace</Badge>
                        <h1 className="text-3xl sm:text-4xl font-bold mt-4 mb-3 serif" style={{ color: 'var(--ink)' }}>{partner.name}</h1>
                        <p className="text-lg" style={{ color: 'var(--slate)' }}>{partner.description}</p>
                    </div>

                    <h2 className="text-xl font-semibold mb-6 serif" style={{ color: 'var(--ink)' }}>Client Spaces</h2>
                    <div className="grid gap-5 sm:grid-cols-2 lg:grid-cols-3">
                        {clientEntries.map(([cid, client]) => {
                            const auditCount = Object.keys(client.audits).length;
                            return (
                                <div key={cid} onClick={() => onNavigate('client-hub', partnerId, cid)}
                                    className="bg-white rounded-xl border p-6 cursor-pointer card-lift group" style={{ borderColor: 'var(--cloud)' }}>
                                    <div className="w-10 h-10 rounded-lg flex items-center justify-center mb-4" style={{ background: 'var(--accent-light)' }}>
                                        <svg className="w-5 h-5" style={{ color: 'var(--accent)' }} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
                                    </div>
                                    <h3 className="text-lg font-semibold mb-1 group-hover:text-blue-700 transition-colors" style={{ color: 'var(--ink)' }}>{client.name}</h3>
                                    <p className="text-sm mb-3 leading-relaxed" style={{ color: 'var(--slate)' }}>{client.description}</p>
                                    <div className="flex items-center justify-between">
                                        <span className="text-xs" style={{ color: 'var(--slate)' }}>{auditCount} audits, 1 report</span>
                                        <span className="inline-flex items-center text-sm font-medium" style={{ color: 'var(--accent)' }}>Open<ChevronRight /></span>
                                    </div>
                                </div>
                            );
                        })}

                        {/* Scalability placeholder */}
                        <div className="rounded-xl border-2 border-dashed p-6 flex flex-col items-center justify-center text-center min-h-[180px]" style={{ borderColor: 'var(--cloud)' }}>
                            <div className="w-10 h-10 rounded-full flex items-center justify-center mb-3" style={{ background: 'var(--cloud)' }}>
                                <svg className="w-5 h-5" style={{ color: 'var(--slate)' }} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>
                            </div>
                            <p className="text-sm font-medium" style={{ color: 'var(--slate)' }}>Additional client spaces</p>
                            <p className="text-xs mt-1" style={{ color: 'var(--slate)', opacity: 0.7 }}>New clients will appear here</p>
                        </div>
                    </div>
                </PageShell>
            );
        };

        /* ============================================================
           DIRECT CLIENT HUB  — lists a direct client's projects
           (e.g. Aikido Security → Google Search Campaigns, future LinkedIn…)
           ============================================================ */
        const DirectClientHub = ({ partnerId, onNavigate, accessMode }) => {
            /* partnerId here is the direct-client id (it sits in the partnerId slot). */
            const dc = portalData.directClients[partnerId];
            if (!dc) return null;
            const projectEntries = Object.entries(dc.projects || {});

            const crumbs = accessMode === 'master'
                ? [
                    { label: 'Portal', onClick: () => onNavigate('portal-root') },
                    { label: 'Client Workspaces', onClick: () => onNavigate('portal-root') },
                    { label: dc.name }
                ]
                : [{ label: dc.name }];

            return (
                <PageShell crumbs={crumbs} onNavigate={accessMode === 'master' ? onNavigate : undefined}>
                    {accessMode === 'master' && <BackButton label="Back to Portal" onClick={() => onNavigate('portal-root')} />}
                    <div className="mb-10">
                        <Badge>Client workspace</Badge>
                        <h1 className="text-3xl sm:text-4xl font-bold mt-4 mb-3 serif" style={{ color: 'var(--ink)' }}>{dc.name}</h1>
                        <p className="text-lg" style={{ color: 'var(--slate)' }}>{dc.description}</p>
                    </div>

                    <h2 className="text-xl font-semibold mb-2 serif" style={{ color: 'var(--ink)' }}>Projects</h2>
                    <p className="text-sm mb-6" style={{ color: 'var(--slate)' }}>Each project is a separate campaign analysis.</p>
                    <div className="grid gap-5 sm:grid-cols-2 lg:grid-cols-3">
                        {projectEntries.map(([projId, project]) => {
                            const auditCount = Object.keys(project.audits || {}).length;
                            return (
                                <div key={projId} onClick={() => onNavigate('client-hub', partnerId, projId)}
                                    className="bg-white rounded-xl border p-6 cursor-pointer card-lift group" style={{ borderColor: 'var(--cloud)' }}>
                                    <div className="w-10 h-10 rounded-lg flex items-center justify-center mb-4" style={{ background: 'var(--accent-light)' }}>
                                        <svg className="w-5 h-5" style={{ color: 'var(--accent)' }} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                                    </div>
                                    <h3 className="text-lg font-semibold mb-1 group-hover:text-blue-700 transition-colors" style={{ color: 'var(--ink)' }}>{project.name}</h3>
                                    <p className="text-sm mb-3 leading-relaxed" style={{ color: 'var(--slate)' }}>{project.description}</p>
                                    <div className="flex items-center justify-between">
                                        <span className="text-xs" style={{ color: 'var(--slate)' }}>{auditCount} audits, 1 report</span>
                                        <span className="inline-flex items-center text-sm font-medium" style={{ color: 'var(--accent)' }}>Open<ChevronRight /></span>
                                    </div>
                                </div>
                            );
                        })}

                        {/* Scalability placeholder for future projects (LinkedIn, etc.) */}
                        <div className="rounded-xl border-2 border-dashed p-6 flex flex-col items-center justify-center text-center min-h-[180px]" style={{ borderColor: 'var(--cloud)' }}>
                            <div className="w-10 h-10 rounded-full flex items-center justify-center mb-3" style={{ background: 'var(--cloud)' }}>
                                <svg className="w-5 h-5" style={{ color: 'var(--slate)' }} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>
                            </div>
                            <p className="text-sm font-medium" style={{ color: 'var(--slate)' }}>More projects coming</p>
                            <p className="text-xs mt-1" style={{ color: 'var(--slate)', opacity: 0.7 }}>LinkedIn &amp; other campaigns will appear here</p>
                        </div>
                    </div>
                </PageShell>
            );
        };

        /* ============================================================
           CLIENT HUB  /portal/partner-workspaces/{partnerId}/{clientId}
           ============================================================ */
        const ClientHub = ({ partnerId, clientId, onNavigate, accessMode }) => {
            const { partner, client, isDirect } = resolvePortalClient(partnerId, clientId);
            if (!client) return null;
            /* Where the "back to container" action goes: a direct client's project goes
               back to the client-workspace-hub (project list); a partner's client goes
               back to the partner-workspace. */
            const backToContainer = () => onNavigate(isDirect ? 'client-workspace-hub' : 'partner-workspace', partnerId);
            const containerCrumb = { label: partner.name, onClick: backToContainer };

            const crumbs = accessMode === 'master'
                ? [{ label: 'Portal', onClick: () => onNavigate('portal-root') }, containerCrumb, { label: client.name }]
                : [containerCrumb, { label: client.name }];

            return (
                <PageShell crumbs={crumbs} onNavigate={onNavigate}>
                    {accessMode !== 'client' && <BackButton label={`Back to ${partner.name}`} onClick={backToContainer} />}
                    <div className="mb-10">
                        <h1 className="text-3xl sm:text-4xl font-bold mb-3 serif" style={{ color: 'var(--ink)' }}>{client.name}</h1>
                        <p className="text-lg" style={{ color: 'var(--slate)' }}>{client.description}</p>
                    </div>

                    {/* Primary deliverable */}
                    <section className="mb-14">
                        <h2 className="text-xl font-semibold mb-5 serif" style={{ color: 'var(--ink)' }}>Primary Deliverable</h2>
                        <div onClick={() => onNavigate('positioning', partnerId, clientId)}
                            className="rounded-xl p-7 sm:p-8 cursor-pointer transition-all hover:shadow-xl card-lift text-white"
                            style={{ background: 'linear-gradient(135deg, var(--accent) 0%, #1a3fa0 100%)' }}>
                            <span className="inline-block px-3 py-1 text-xs font-semibold rounded-full tracking-wide uppercase" style={{ background: 'rgba(255,255,255,0.18)', color: '#fff', border: '1px solid rgba(255,255,255,0.35)' }}>Strategic Analysis</span>
                            <h3 className="text-2xl sm:text-3xl font-bold mt-4 mb-3 serif">{client.positioning.title}</h3>
                            <p className="text-blue-100 leading-relaxed mb-6 max-w-2xl">{client.positioning.summary}</p>
                            <span className="inline-flex items-center px-5 py-2.5 bg-white font-semibold text-sm rounded-lg transition-colors" style={{ color: 'var(--accent)' }}>
                                Read Full Report<ChevronRight />
                            </span>
                        </div>
                    </section>

                    {/* Supporting audits */}
                    <section>
                        <h2 className="text-xl font-semibold mb-2 serif" style={{ color: 'var(--ink)' }}>Supporting Analysis</h2>
                        <p className="text-sm mb-6" style={{ color: 'var(--slate)' }}>Individual campaign audits that inform the strategic recommendations</p>
                        <div className="grid gap-5 sm:grid-cols-2 lg:grid-cols-3">
                            {Object.entries(client.audits).map(([aid, audit]) => (
                                <div key={aid} onClick={() => onNavigate('audit', partnerId, clientId, aid)}
                                    className="bg-white rounded-xl border p-5 cursor-pointer card-lift group" style={{ borderColor: 'var(--cloud)' }}>
                                    <div className="flex items-center justify-between mb-3">
                                        <Badge>Audit {aid}</Badge>
                                        <svg className="h-4 w-4 transition-colors" style={{ color: 'var(--slate)' }} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>
                                    </div>
                                    <h3 className="text-base font-semibold mb-2 group-hover:text-blue-700 transition-colors leading-snug" style={{ color: 'var(--ink)' }}>{audit.title}</h3>
                                    <p className="text-sm leading-relaxed" style={{ color: 'var(--slate)' }}>{audit.summary}</p>
                                </div>
                            ))}
                        </div>
                    </section>
                </PageShell>
            );
        };

        /* ============================================================
           POSITIONING REPORT (dedicated on-page report)
           ============================================================ */
        const PositioningReportPage = ({ partnerId, clientId, onNavigate, accessMode }) => {
            const { partner, client, isDirect } = resolvePortalClient(partnerId, clientId);
            const containerNav = () => onNavigate(isDirect ? 'client-workspace-hub' : 'partner-workspace', partnerId);
            const [openSections, setOpenSections] = useState({});
            /* Live-fetched synthesis content when this client uses a synthId
               (single source of truth shared with the public ?synth= URL). */
            const [fetchedSynth, setFetchedSynth] = useState(null);
            const [fetchedSynthError, setFetchedSynthError] = useState(null);
            const synthIdToFetch = client.positioning && client.positioning.synthId;
            /* Permalink for the synthesis report. We sync the address bar to this URL
               while the report is visible so the user can copy it from the navigator
               directly (no separate copy banner needed). */
            const synthShareUrl = synthIdToFetch
                ? `${window.location.origin}/?synth=${synthIdToFetch}`
                : null;
            useEffect(() => {
                if (!synthShareUrl) return;
                try {
                    const u = new URL(synthShareUrl, window.location.origin);
                    const target = u.pathname + u.search + u.hash;
                    if (window.location.pathname + window.location.search + window.location.hash !== target) {
                        window.history.replaceState(null, '', target);
                    }
                } catch (e) { /* ignore */ }
            }, [synthShareUrl]);
            useEffect(() => {
                if (!synthIdToFetch) return;
                let cancelled = false;
                fetch(`/api/synthesize?id=${encodeURIComponent(synthIdToFetch)}`)
                    .then(r => r.ok ? r.json() : Promise.reject(new Error('HTTP ' + r.status)))
                    .then(d => { if (!cancelled) setFetchedSynth(d); })
                    .catch(e => { if (!cancelled) setFetchedSynthError(e.message); });
                return () => { cancelled = true; };
            }, [synthIdToFetch]);

            /* Build the markdown content from synthId fetch (preferred) or fullContent fallback. */
            const liveMarkdown = fetchedSynth && fetchedSynth.markdown;
            const useFullContent = client.positioning && (liveMarkdown || client.positioning.fullContent);

            /* Loading state while we fetch from synthId. */
            if (synthIdToFetch && !fetchedSynth && !fetchedSynthError) {
                return (
                    <PageShell onNavigate={onNavigate}>
                        <div className="max-w-3xl mx-auto py-16 text-center">
                            <div className="inline-block w-6 h-6 rounded-full border-2 animate-spin" style={{ borderColor: 'var(--cloud)', borderTopColor: 'var(--accent)' }}></div>
                            <p className="text-sm mt-4" style={{ color: 'var(--slate)' }}>Loading synthesis…</p>
                        </div>
                    </PageShell>
                );
            }
            /* Error state: the fetch failed and there's no fullContent fallback. */
            if (synthIdToFetch && fetchedSynthError && !client.positioning?.fullContent) {
                return (
                    <PageShell onNavigate={onNavigate}>
                        <div className="max-w-3xl mx-auto py-16">
                            <BackButton label={`Back to ${client.name} Hub`} onClick={() => onNavigate('client-hub', partnerId, clientId)} />
                            <div className="rounded-lg p-5 border" style={{ background: 'var(--danger-light)', borderColor: 'var(--danger)' }}>
                                <p className="text-sm" style={{ color: 'var(--ink)' }}>Couldn't load the synthesis report. ({fetchedSynthError})</p>
                            </div>
                        </div>
                    </PageShell>
                );
            }

            /* Runtime safety net: scrub charged/sensationalist words from synthesis
               content (same list as the public viewer). Protects against stale stored
               content the user hasn't regenerated yet. */
            const scrubChargedLanguage = (text) => {
                if (!text || typeof text !== 'string') return text;
                const replacements = [
                    [/\bschizophrenic\b/gi, 'inconsistent'],
                    [/\bhemorrhaging\b/gi, 'losing'],
                    [/\bhemorrhage(s|d)?\b/gi, (_, s) => 'lose' + (s === 's' ? 's' : s === 'd' ? 'd' : '')],
                    [/\bbipolar\b/gi, 'inconsistent'],
                    [/\bcancer\b/gi, 'problem'],
                    [/\binsane\b/gi, 'extreme'],
                    [/\bcrazy\b/gi, 'extreme'],
                    [/\bpsycho\b/gi, 'irrational'],
                    [/\bmanic\b/gi, 'frantic'],
                    [/\banxiety-inducing\b/gi, 'stressful'],
                    [/\bweaponize\b/gi, 'leverage'],
                    [/\bnuclear\b/gi, 'severe']
                ];
                let out = text;
                for (const [re, sub] of replacements) out = out.replace(re, sub);
                /* Platform-aware trust signals: Google Search RSAs + extensions are
                   text-only. Rewrite logo/badge-in-ad recommendations to text-native
                   equivalents. LP recommendations untouched. */
                out = out.replace(
                    /\b(add|include|use|put)\s+(?:customer\s+)?logos?\s+(?:and\s+badges?\s+)?(?:in|to|inside|into)\s+(?:the\s+|your\s+|all\s+)?ad\s+extensions?\b/gi,
                    'add named-customer mentions via structured snippets and ratings via callout extensions'
                );
                out = out.replace(
                    /\b(?:customer\s+)?logos?\s+(?:and\s+badges?\s+)?(?:in|to)\s+(?:the\s+|your\s+|all\s+)?ad\s+extensions?\b/gi,
                    'named-customer mentions in structured snippets and callout extensions'
                );
                out = out.replace(
                    /\b(?:add|include|use)\s+(?:customer\s+)?logos?\s+(?:in|to|inside)\s+(?:the\s+)?ad\s+copy\b/gi,
                    'add named-customer mentions in headlines and descriptions'
                );
                out = out.replace(
                    /\btrust\s+badges?\s+(?:in|to|inside)\s+(?:the\s+|your\s+)?ad(?:s|\s+copy|\s+extensions?)\b/gi,
                    'text-based trust signals (callout extensions like "4.7★ G2" or "SOC 2 Type II")'
                );
                out = out.replace(
                    /\b(?:and\s+)?customer\s+logos?\s+to\s+all\s+ad\s+extensions?\b/gi,
                    'and named-customer mentions via structured snippets'
                );
                return out;
            };

            /* If this client has live-fetched synth content OR fullContent markdown, render via the rich path. */
            if (useFullContent) {
                const containerCrumb = { label: partner.name, onClick: containerNav };
                const clientCrumb = { label: client.name, onClick: () => onNavigate('client-hub', partnerId, clientId) };
                const crumbs = accessMode === 'master'
                    ? [{ label: 'Portal', onClick: () => onNavigate('portal-root') }, containerCrumb, clientCrumb, { label: 'Positioning Report' }]
                    : [containerCrumb, clientCrumb, { label: 'Positioning Report' }];
                /* Parse content into sections by H2 headers. Each section becomes a collapsible block.
                   The TOC at the top links to each section.
                   Prefer the live-fetched synthesis content (synthId) over hardcoded fullContent.
                   Scrub charged language before parsing. */
                const raw = scrubChargedLanguage(liveMarkdown || client.positioning.fullContent);
                /* Parse Prepared for/Date/Prepared by metadata anywhere in the markdown
                   and render it as the metadata line under H1 (matches Nudge). */
                const parseMeta = (text) => {
                    const meta = {};
                    const re = /\*\*(Prepared for|Date|Prepared by):\*\*\s*([^\n]+)/gi;
                    let m;
                    while ((m = re.exec(text)) !== null) {
                        const key = m[1].toLowerCase().replace(/\s+/g, '');
                        meta[key] = m[2].trim();
                    }
                    return meta;
                };
                const meta = parseMeta(raw);
                // Strip the leading H1 + frontmatter (everything up to first ## )
                const trimmed = raw.replace(/^[\s\S]*?(?=\n## )/, '').trim();
                /* Drop leading numeric prefixes (e.g., "1) A) Executive Summary" → "A) Executive Summary"). */
                const cleanTitle = (t) => t.replace(/^\d+\)\s*/, '').trim();
                /* Detect sections whose body is empty or only metadata lines — drop those
                   from the rendered TOC + collapsibles. */
                const META_RE_PORTAL = /^\*\*(Prepared for|Date|Prepared by):\*\*/i;
                const isMetaOnly = (body) => {
                    const lines = body.split('\n').map(l => l.trim()).filter(l => l !== '' && l !== '---');
                    if (lines.length === 0) return true;
                    return lines.every(l => META_RE_PORTAL.test(l));
                };
                // Split into sections at H2 boundaries
                const sectionRe = /^## (.+)$/gm;
                const rawSections = [];
                let match;
                let lastIdx = 0;
                let lastTitle = null;
                while ((match = sectionRe.exec(trimmed)) !== null) {
                    if (lastTitle !== null) {
                        rawSections.push({
                            title: cleanTitle(lastTitle),
                            body: trimmed.slice(lastIdx, match.index).trim()
                        });
                    }
                    lastTitle = match[1].trim();
                    lastIdx = match.index + match[0].length;
                }
                if (lastTitle !== null) {
                    rawSections.push({ title: cleanTitle(lastTitle), body: trimmed.slice(lastIdx).trim() });
                }
                const sections = rawSections.filter(s => s.body && s.body.length > 0 && !isMetaOnly(s.body));
                const slug = (s) => s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
                return (
                    <PageShell crumbs={crumbs} onNavigate={onNavigate}>
                        <div className="max-w-3xl mx-auto">
                            <BackButton label={`Back to ${client.name} Hub`} onClick={() => onNavigate('client-hub', partnerId, clientId)} />
                            <Badge>Strategic Analysis</Badge>
                            <h1 className="text-3xl sm:text-4xl font-bold mt-4 mb-2 serif" style={{ color: 'var(--ink)' }}>{client.positioning.title}</h1>
                            {(meta.preparedfor || meta.date || meta.preparedby) ? (
                                <div className="flex flex-wrap gap-x-6 gap-y-1 text-sm mt-3 mb-6" style={{ color: 'var(--slate)' }}>
                                    {meta.preparedfor && <span><strong style={{ color: 'var(--ink-light)' }}>Prepared for:</strong> {meta.preparedfor}</span>}
                                    {meta.date && <span><strong style={{ color: 'var(--ink-light)' }}>Date:</strong> {meta.date}</span>}
                                    {meta.preparedby && <span><strong style={{ color: 'var(--ink-light)' }}>Prepared by:</strong> {meta.preparedby}</span>}
                                </div>
                            ) : (
                                <p className="text-lg mb-6" style={{ color: 'var(--slate)' }}>{client.positioning.subtitle}</p>
                            )}
                            <div className="mb-2"></div>
                            {/* TOC card — same Nudge styling as the synthesis viewer:
                                white background, rounded-xl, uppercase tracking-wider header,
                                row-flow grid. Sits OUTSIDE the main report card. */}
                            {sections.length > 0 && (
                                <div className="rounded-xl border p-5 mb-10" style={{ background: '#fff', borderColor: 'var(--cloud)' }}>
                                    <p className="text-xs font-semibold uppercase tracking-wider mb-3" style={{ color: 'var(--slate)' }}>Report Sections</p>
                                    <div className="grid sm:grid-cols-2 gap-x-6 gap-y-1.5 text-sm">
                                        {sections.map((s, i) => (
                                            <a key={i} href={`#${slug(s.title)}`}
                                                onClick={(e) => {
                                                    e.preventDefault();
                                                    setOpenSections(prev => ({ ...prev, [slug(s.title)]: true }));
                                                    setTimeout(() => {
                                                        const el = document.getElementById(slug(s.title));
                                                        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                                                    }, 50);
                                                }}
                                                className="text-left hover:underline" style={{ color: 'var(--accent)' }}>{s.title}</a>
                                        ))}
                                    </div>
                                </div>
                            )}
                            <div className="bg-white rounded-xl border overflow-hidden" style={{ borderColor: 'var(--cloud)' }}>
                                <div className="p-6 sm:p-8 space-y-14">
                                    {/* Collapsible sections — with Nudge-style enhancements per section type */}
                                    {sections.map((s, i) => {
                                        const sid = slug(s.title);
                                        const open = openSections[sid] !== false; // default open
                                        return (
                                            <section key={i} id={sid}>
                                                <button onClick={() => setOpenSections(prev => ({ ...prev, [sid]: !open }))}
                                                    className="w-full flex items-center justify-between py-1 group bg-transparent border-0 cursor-pointer text-left">
                                                    <h2 className="text-2xl font-semibold serif" style={{ color: 'var(--ink)' }}>{s.title}</h2>
                                                    <svg className={`w-5 h-5 transition-transform flex-shrink-0 ml-4 ${open ? 'rotate-180' : ''}`} style={{ color: 'var(--slate)' }} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                                                    </svg>
                                                </button>
                                                {open && (
                                                    <div className="mt-5">
                                                        <NudgeStyleSection title={s.title} body={s.body} />
                                                    </div>
                                                )}
                                            </section>
                                        );
                                    })}
                                </div>
                                <ContentNav current="positioning" partnerId={partnerId} clientId={clientId} onNavigate={onNavigate} />
                            </div>
                        </div>
                    </PageShell>
                );
            }

            const toggleSection = (id) => setOpenSections(prev => ({ ...prev, [id]: !prev[id] }));
            const isOpen = (id) => openSections[id] !== false; // default open

            const crumbs = accessMode === 'master'
                ? [
                    { label: 'Portal', onClick: () => onNavigate('portal-root') },
                    { label: partner.name, onClick: () => onNavigate('partner-workspace', partnerId) },
                    { label: client.name, onClick: () => onNavigate('client-hub', partnerId, clientId) },
                    { label: 'Positioning Report' }
                ]
                : accessMode === 'partner'
                ? [
                    { label: partner.name, onClick: () => onNavigate('partner-workspace', partnerId) },
                    { label: client.name, onClick: () => onNavigate('client-hub', partnerId, clientId) },
                    { label: 'Positioning Report' }
                ]
                : [
                    { label: client.name, onClick: () => onNavigate('client-hub', partnerId, clientId) },
                    { label: 'Positioning Report' }
                ];

            const SectionToggle = ({ id, title, defaultOpen = true }) => {
                if (openSections[id] === undefined && defaultOpen) {
                    // initialize
                }
                const open = openSections[id] !== undefined ? openSections[id] : defaultOpen;
                return (
                    <button onClick={() => setOpenSections(prev => ({ ...prev, [id]: !open }))}
                        className="w-full flex items-center justify-between py-1 group">
                        <h2 className="text-2xl font-semibold serif text-left" style={{ color: 'var(--ink)' }}>{title}</h2>
                        <svg className={`w-5 h-5 transition-transform flex-shrink-0 ml-4 ${open ? 'rotate-180' : ''}`} style={{ color: 'var(--slate)' }} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                        </svg>
                    </button>
                );
            };

            const isSectionOpen = (id, defaultOpen = true) => {
                return openSections[id] !== undefined ? openSections[id] : defaultOpen;
            };

            const SimpleTable = ({ headers, rows }) => (
                <div className="overflow-x-auto rounded-lg border" style={{ borderColor: 'var(--cloud)' }}>
                    <table className="w-full text-sm">
                        <thead>
                            <tr style={{ background: 'var(--mist)' }}>
                                {headers.map((h, i) => (
                                    <th key={i} className="px-4 py-3 text-left font-semibold" style={{ color: 'var(--ink)', borderBottom: '1px solid var(--cloud)' }}>{h}</th>
                                ))}
                            </tr>
                        </thead>
                        <tbody>
                            {rows.map((row, ri) => (
                                <tr key={ri} style={{ borderBottom: ri < rows.length - 1 ? '1px solid var(--cloud)' : 'none' }}>
                                    {row.map((cell, ci) => (
                                        <td key={ci} className="px-4 py-3 leading-relaxed" style={{ color: ci === 0 ? 'var(--ink)' : 'var(--ink-light)' }}>
                                            {typeof cell === 'object' && cell.bold ? <strong>{cell.text}</strong> : cell}
                                        </td>
                                    ))}
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );

            const Quote = ({ text, source }) => (
                <div className="border-l-4 pl-4 py-2 my-3" style={{ borderColor: 'var(--accent)', background: 'var(--accent-faint)' }}>
                    <p className="text-sm italic leading-relaxed" style={{ color: 'var(--ink-light)' }}>{text}</p>
                    {source && <p className="text-xs mt-1 font-medium" style={{ color: 'var(--slate)' }}>{source}</p>}
                </div>
            );

            /* Report content + metadata come from the server (client.positioning.report),
               filtered per session — never in the browser bundle. */
            const r = client.positioning.report;
            const meta = client.positioning.meta || {};
            if (!r) {
                return (
                    <PageShell crumbs={crumbs} onNavigate={onNavigate}>
                        <div className="max-w-3xl mx-auto py-16 text-center">
                            <p className="text-sm" style={{ color: 'var(--slate)' }}>Loading report…</p>
                        </div>
                    </PageShell>
                );
            }

            return (
                <PageShell crumbs={crumbs} onNavigate={onNavigate}>
                    <div className="max-w-3xl mx-auto">
                        <BackButton label={`Back to ${client.name} Hub`} onClick={() => onNavigate('client-hub', partnerId, clientId)} />
                        <Badge>Strategic Analysis</Badge>
                        <h1 className="text-3xl sm:text-4xl font-bold mt-4 mb-2 serif" style={{ color: 'var(--ink)' }}>{client.positioning.title}</h1>
                        <div className="flex flex-wrap gap-x-6 gap-y-1 text-sm mt-3 mb-4" style={{ color: 'var(--slate)' }}>
                            {meta.preparedFor && <span><strong style={{ color: 'var(--ink-light)' }}>Prepared for:</strong> {meta.preparedFor}</span>}
                            {meta.date && <span><strong style={{ color: 'var(--ink-light)' }}>Date:</strong> {meta.date}</span>}
                            {meta.preparedBy && <span><strong style={{ color: 'var(--ink-light)' }}>Prepared by:</strong> {meta.preparedBy}</span>}
                        </div>

                        {/* TOC */}
                        <div className="rounded-xl border p-5 mb-10" style={{ background: '#fff', borderColor: 'var(--cloud)' }}>
                            <p className="text-xs font-semibold uppercase tracking-wider mb-3" style={{ color: 'var(--slate)' }}>Report Sections</p>
                            <div className="grid sm:grid-cols-2 gap-x-6 gap-y-1.5 text-sm">
                                {[
                                    ['A', 'Executive Summary (Key Findings)'],
                                    ['B', 'What the Audits Agree On'],
                                    ['C', 'Inconsistencies & How to Resolve'],
                                    ['D', 'Recommended Positioning'],
                                    ['E', 'ICP & Segmentation'],
                                    ['F', 'Messaging Pillars + Proof Points'],
                                    ['G', 'Offer & CTA Direction'],
                                    ['H', 'Do/Don\'t Messaging Rules'],
                                    ['I', 'Next 10 Actions + Testing Plan'],
                                    ['X', 'Appendix: Audit Score Summary'],
                                ].map(([id, label]) => (
                                    <button key={id} onClick={() => {
                                        const el = document.getElementById(`section-${id}`);
                                        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                                    }} className="text-left hover:underline" style={{ color: 'var(--accent)' }}>
                                        {id !== 'X' ? `${id}) ` : ''}{label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="bg-white rounded-xl border overflow-hidden" style={{ borderColor: 'var(--cloud)' }}>
                            <div className="p-6 sm:p-8 space-y-14">

                                {/* ===== SECTION A: Executive Summary ===== */}
                                <section id="section-A">
                                    <SectionToggle id="A" title="A) Executive Summary (Key Findings)" />
                                    {isSectionOpen('A') && (
                                        <div className="mt-5 space-y-4">
                                            <div className="rounded-lg p-5 border-l-4" style={{ background: 'var(--danger-light)', borderColor: 'var(--danger)' }}>
                                                <p className="font-semibold mb-2" style={{ color: 'var(--ink)' }}>{r.sectionA.intro.title}</p>
                                                <p className="text-sm leading-relaxed" style={{ color: 'var(--ink-light)' }}>{r.sectionA.intro.desc}</p>
                                            </div>
                                            {r.sectionA.findings.map((item, i) => (
                                                <div key={i} className="flex items-start space-x-4">
                                                    <div className="flex-shrink-0 w-7 h-7 rounded-full flex items-center justify-center text-white text-xs font-bold" style={{ background: 'var(--accent)' }}>{i + 1}</div>
                                                    <div>
                                                        <p className="font-semibold text-sm" style={{ color: 'var(--ink)' }}>{item.title}</p>
                                                        <p className="text-sm leading-relaxed mt-0.5" style={{ color: 'var(--ink-light)' }}>{item.desc}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </section>

                                {/* ===== SECTION B: Patterns + Evidence ===== */}
                                <section id="section-B">
                                    <SectionToggle id="B" title="B) What the Audits Agree On (Patterns + Evidence)" />
                                    {isSectionOpen('B') && (
                                        <div className="mt-5 space-y-10">
                                            {r.sectionB.map((p, pi) => (
                                                <div key={pi}>
                                                    <h3 className="text-lg font-semibold mb-1" style={{ color: 'var(--ink)' }}>{p.title}</h3>
                                                    <p className="text-xs font-medium mb-3" style={{ color: 'var(--danger)' }}>{p.frequency}</p>
                                                    {p.table && <SimpleTable headers={p.table.headers} rows={p.table.rows} />}
                                                    {(p.quotes || []).map((q, qi) => (
                                                        <Quote key={qi} text={q.text} source={q.source} />
                                                    ))}
                                                    {p.fix && (
                                                        <div className="rounded-lg p-4 mt-3" style={{ background: 'var(--success-light)' }}>
                                                            <p className="text-sm font-semibold" style={{ color: 'var(--success)' }}>{p.fix.label}</p>
                                                            <p className="text-sm mt-1" style={{ color: 'var(--ink-light)' }}>{p.fix.text}</p>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </section>

                                {/* ===== SECTION C: Contradictions ===== */}
