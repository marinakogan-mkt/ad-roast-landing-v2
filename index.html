        /* ============================================================
           AUDIT PAGE
           ============================================================ */
        const AuditPage = ({ partnerId, clientId, auditId, onNavigate, accessMode }) => {
            const { partner, client, isDirect } = resolvePortalClient(partnerId, clientId);
            const containerNav = () => onNavigate(isDirect ? 'client-workspace-hub' : 'partner-workspace', partnerId);
            const audit = client ? client.audits[auditId] : null;
            if (!audit) return null;

            /* Live-fetch the linked roast so Key Findings + Recommendations stay in sync
               with the actual AdRoast report at audit.auditUrl (single source of truth).
               If the URL is an adroast.in/?id=<id> link, pull the report and derive a
               concise summary. Otherwise, fall back to the hand-written audit.findings
               and audit.recommendations from portalData. */
            const [liveRoast, setLiveRoast] = useState(null);
            const [liveRoastError, setLiveRoastError] = useState(false);
            /* Permalink for the underlying audit report. We always append &portal=1 so the
               URL stays in the portal-styled view. The address bar is updated to this URL
               while the audit is visible — the user can copy it from the navigator
               directly (no separate copy banner needed). */
            const fullAuditUrl = (audit.auditUrl && audit.auditUrl !== '#')
                ? (audit.auditUrl.includes('portal=1') ? audit.auditUrl : audit.auditUrl + '&portal=1')
                : null;
            useEffect(() => {
                if (!fullAuditUrl) return;
                try {
                    /* Use the path-relative portion so the same hash/origin handling applies. */
                    const u = new URL(fullAuditUrl, window.location.origin);
                    const target = u.pathname + u.search + u.hash;
                    if (window.location.pathname + window.location.search + window.location.hash !== target) {
                        window.history.replaceState(null, '', target);
                    }
                } catch (e) { /* ignore */ }
            }, [fullAuditUrl]);
            const reportId = (() => {
                const u = audit.auditUrl;
                if (!u || u === '#') return null;
                const m = u.match(/[?&]id=([^&#]+)/);
                return m ? m[1] : null;
            })();
            useEffect(() => {
                if (!reportId) return;
                let cancelled = false;
                fetch(`/api/roast-view?id=${encodeURIComponent(reportId)}`)
                    .then(r => r.ok ? r.json() : Promise.reject(new Error('HTTP ' + r.status)))
                    .then(d => { if (!cancelled) setLiveRoast(d); })
                    .catch(() => { if (!cancelled) setLiveRoastError(true); });
                return () => { cancelled = true; };
            }, [reportId]);

            /* Rewrite wrong-surface trust-signal recommendations. Google Search RSAs and
               ad extensions are text-only — recommendations like "add customer logos to the ad"
               or "no logos / no badges" (observed inside an AD issue) don't map to anything
               the format supports. Translate to text-native equivalents. We only apply this to
               AD issues (r.issues), NOT to landing_page_roast — LP logos/badges are valid. */
            const scrubAdSurfaceTrustText = (text) => {
                if (!text || typeof text !== 'string') return text;
                let out = text;
                /* Observational ("zero/no logos and badges") in an ad-trust-signals issue */
                out = out.replace(
                    /\bzero\s+social\s+proof,?\s*no\s+(?:customer\s+)?logos?,?\s*no\s+(?:security\s+|trust\s+|compliance\s+)?badges?\b/gi,
                    'no text-based trust signals — no named-customer mentions in copy, no callout-extension ratings, no structured snippets'
                );
                out = out.replace(
                    /\bno\s+(?:customer\s+)?logos?,?\s*no\s+(?:security\s+|trust\s+|compliance\s+)?badges?\b/gi,
                    'no named-customer mentions in copy and no callout-extension ratings'
                );
                out = out.replace(
                    /\bno\s+(?:customer\s+)?logos?\s+or\s+(?:security\s+|trust\s+|compliance\s+)?badges?\b/gi,
                    'no named-customer mentions or callout-extension ratings'
                );
                /* Prescriptive ("add customer logos to the ad"). Alternation ordered
                   longest-first so "ad extensions" matches before bare "ad". */
                out = out.replace(
                    /\b(add|include|use)\s+(?:enterprise\s+|customer\s+)?logos?(?:\s+and\s+(?:security\s+|trust\s+|compliance\s+)?(?:badges?|certifications?))?\s+(?:in|to|inside|into)\s+(?:the\s+|your\s+|all\s+)?(?:ad\s+extensions?|ad\s+copy|headlines?|descriptions?|ads|ad)\b/gi,
                    'add named-customer mentions in headlines/descriptions and ratings via callout extensions (e.g., "4.7★ G2", "SOC 2 Type II")'
                );
                /* Bare "customer logos in/to extensions" without an action verb */
                out = out.replace(
                    /\b(?:customer\s+)?logos?\s+(?:and\s+(?:security\s+|trust\s+|compliance\s+)?badges?\s+)?(?:in|to)\s+(?:the\s+|your\s+|all\s+)?(?:ad\s+extensions?|ad\s+copy)\b/gi,
                    'named-customer mentions and rating callouts'
                );
                return out;
            };
            /* Filter out capability-disclaimer text the LLM sometimes emits
               (e.g. "Can't assess visuals", "Unable to evaluate", "Without seeing the image").
               These shouldn't surface in client-facing portal content. */
            const isCapabilityDisclaimer = (text) => {
                if (!text || typeof text !== 'string') return false;
                const t = text.toLowerCase();
                return /\b(can'?t|cannot|can not|unable to|couldn'?t|could not|hard to|difficult to|without (seeing|access(ing)?|the (image|visual|asset|screenshot)))\b.*\b(assess|evaluate|analyze|see|view|verify|determine|judge|gauge|read|inspect|review|comment|tell|know|measure)\b/.test(t)
                    || /\b(no|missing|absent)\b.*\b(image|visual|screenshot|asset|preview)\b.*\b(provided|available|attached|shown)\b/.test(t)
                    || /\b(visuals?|images?|screenshots?|creative assets?)\b.*\b(not (provided|available|shown|attached|visible))\b/.test(t)
                    || /\b(I (don'?t|do not|cannot|can'?t))\b.*\b(have|see|access)\b/.test(t)
                    || /^(note|caveat|disclaimer):/i.test(text.trim());
            };

            /* Platform-aware filter mirroring the public viewer. Google Search RSAs
               are text-only — drop any trust_signals issue (or any other) that
               observes the absence of logos/badges. Meta/LinkedIn keep these cards.
               Legacy Aikido IDs fall through as a backup if the platform field is
               missing from the stored roast record. */
            const AIKIDO_PORTAL_REPORT_IDS = new Set(['6Yba3yPp', 'Gs6hNNTA', 'zVNStrvS', 'C78UmgSD', 'ttdKdxxc']);
            const liveRoastPlatform = liveRoast ? String((liveRoast.platform) || '').toLowerCase() : '';
            const portalPlatformIsGoogle = liveRoastPlatform === 'google'
                || liveRoastPlatform === 'google_ads'
                || liveRoastPlatform === 'google ads'
                || (reportId && AIKIDO_PORTAL_REPORT_IDS.has(reportId));
            const isVisualTrustIssue = (i) => {
                if (!i) return false;
                const body = `${i.title || ''}  ${i.explanation || ''}`;
                const co = /\b(?:customer\s+|enterprise\s+)?logos?\b[\s\S]*?\b(?:security\s+|trust\s+|compliance\s+|certification\s+)?badges?\b/i.test(body)
                        || /\b(?:security\s+|trust\s+|compliance\s+|certification\s+)?badges?\b[\s\S]*?\b(?:customer\s+|enterprise\s+)?logos?\b/i.test(body);
                if (co) return true;
                if (i.category === 'trust_signals' && /\blogos?\b|\bbadges?\b/i.test(body)) return true;
                return false;
            };

            /* Derive a 2-3 line Findings summary + a 2-3 line Recommendations summary
               from the live roast data, matching the brief Nudge-style format. */
            const derivedFindings = (() => {
                if (!liveRoast) return null;
                const r = liveRoast.result || liveRoast;
                const issues = (r.issues || []).filter(i =>
                    i && i.title && (i.score !== undefined) &&
                    !isCapabilityDisclaimer(i.title) &&
                    !isCapabilityDisclaimer(i.explanation) &&
                    !(portalPlatformIsGoogle && isVisualTrustIssue(i))
                );
                if (issues.length === 0) {
                    /* Fall back to ad↔LP mismatch verdict if no issues */
                    const verdict = r.ad_landing_mismatch?.verdict;
                    return verdict && !isCapabilityDisclaimer(verdict) ? verdict : null;
                }
                /* Sort by lowest score first — those are the biggest problems */
                const sorted = [...issues].sort((a, b) => (a.score || 0) - (b.score || 0));
                const top = sorted.slice(0, 2);
                /* Scrub any residual wrong-surface logo/badge text */
                return top.map(i => ({
                    ...i,
                    title: scrubAdSurfaceTrustText(i.title),
                    explanation: scrubAdSurfaceTrustText(i.explanation)
                }));
            })();
            const derivedRecs = (() => {
                if (!liveRoast) return null;
                const r = liveRoast.result || liveRoast;
                const filterRecs = (list) => list.filter(s => typeof s === 'string' && s.trim() && !isCapabilityDisclaimer(s));
                const steps = filterRecs(r.next_steps || []);
                if (steps.length > 0) return steps.slice(0, 3).map(scrubAdSurfaceTrustText);
                /* Fall back to landing-page quick wins (LP-context — don't scrub logo text) */
                const wins = filterRecs(r.landing_page_roast?.quick_wins || []);
                if (wins.length > 0) return wins.slice(0, 3);
                /* Last fallback: fix-kit rationale as one paragraph */
                const rationale = r.fix_kit?.rationale;
                if (rationale && !isCapabilityDisclaimer(rationale)) return [scrubAdSurfaceTrustText(rationale)];
                return null;
            })();

            const containerCrumb = { label: partner.name, onClick: containerNav };
            const clientCrumb = { label: client.name, onClick: () => onNavigate('client-hub', partnerId, clientId) };
            const crumbs = accessMode === 'master'
                ? [{ label: 'Portal', onClick: () => onNavigate('portal-root') }, containerCrumb, clientCrumb, { label: `Audit ${auditId}` }]
                : [containerCrumb, clientCrumb, { label: `Audit ${auditId}` }];

            return (
                <PageShell crumbs={crumbs} onNavigate={onNavigate}>
                    <div className="max-w-3xl mx-auto">
                        <BackButton label={`Back to ${client.name} Hub`} onClick={() => onNavigate('client-hub', partnerId, clientId)} />
                        <Badge>Campaign Audit</Badge>
                        <h1 className="text-3xl sm:text-4xl font-bold mt-4 mb-2 serif" style={{ color: 'var(--ink)' }}>{audit.title}</h1>
                        <p className="text-lg mb-10" style={{ color: 'var(--slate)' }}>{audit.summary}</p>

                        <div className="bg-white rounded-xl border overflow-hidden" style={{ borderColor: 'var(--cloud)' }}>
                            <div className="p-6 sm:p-8 space-y-12">

                                {/* Campaign overview + 'Open Complete Audit Report' button.
                                    For Aikido (audit.parsed present): opens the internal RichAuditView page.
                                    For Nudge (external auditUrl): links out to the tool-generated permalink. */}
                                <section>
                                    <h2 className="text-2xl font-semibold mb-5 serif" style={{ color: 'var(--ink)' }}>Campaign Overview</h2>
                                    <p className="text-base leading-relaxed mb-5" style={{ color: 'var(--ink-light)' }}>{audit.summary}</p>
                                    {(audit.parsed || (audit.auditUrl && audit.auditUrl !== '#')) && (
                                        <div className="rounded-lg p-5" style={{ background: 'var(--accent-faint)' }}>
                                            <h3 className="font-semibold text-sm mb-3" style={{ color: 'var(--ink)' }}>Access Full Analysis</h3>
                                            {audit.parsed ? (
                                                <button onClick={() => onNavigate('audit-full', partnerId, clientId, auditId)}
                                                    className="inline-flex items-center px-5 py-2.5 text-white text-sm font-semibold rounded-lg transition-colors border-0 cursor-pointer"
                                                    style={{ background: 'var(--accent)' }}
                                                    onMouseEnter={e => e.currentTarget.style.background = 'var(--accent-hover)'}
                                                    onMouseLeave={e => e.currentTarget.style.background = 'var(--accent)'}
                                                >
                                                    Open Complete Audit Report<ExternalIcon />
                                                </button>
                                            ) : (
                                                <a href={fullAuditUrl} target="_blank" rel="noopener noreferrer"
                                                    className="inline-flex items-center px-5 py-2.5 text-white text-sm font-semibold rounded-lg transition-colors"
                                                    style={{ background: 'var(--accent)' }}
                                                    onMouseEnter={e => e.currentTarget.style.background = 'var(--accent-hover)'}
                                                    onMouseLeave={e => e.currentTarget.style.background = 'var(--accent)'}
                                                >
                                                    Open Complete Audit Report<ExternalIcon />
                                                </a>
                                            )}
                                        </div>
                                    )}
                                </section>

                                {/* Creative assets — CTAs only, no titles.
                                    Button label switches between singular and plural based on whether
                                    the URL points to a specific /creative/ (one ad) or to the
                                    advertiser library (multiple ads). */}
                                <section>
                                    <h2 className="text-2xl font-semibold mb-5 serif" style={{ color: 'var(--ink)' }}>Creative Assets</h2>
                                    <div className="flex flex-wrap gap-3">
                                        <a href={audit.adUrl} target="_blank" rel="noopener noreferrer"
                                            className="inline-flex items-center px-5 py-2.5 text-white text-sm font-semibold rounded-lg transition-colors"
                                            style={{ background: 'var(--accent)' }}
                                            onMouseEnter={e => e.currentTarget.style.background = 'var(--accent-hover)'}
                                            onMouseLeave={e => e.currentTarget.style.background = 'var(--accent)'}
                                        >{
                                            client.platform === 'Google' ? 'View Google Ads' : 'View LinkedIn Ad'
                                        }<ExternalIcon /></a>
                                        <a href={audit.landingPageUrl} target="_blank" rel="noopener noreferrer"
                                            className="inline-flex items-center px-5 py-2.5 text-white text-sm font-semibold rounded-lg transition-colors"
                                            style={{ background: 'var(--accent)' }}
                                            onMouseEnter={e => e.currentTarget.style.background = 'var(--accent-hover)'}
                                            onMouseLeave={e => e.currentTarget.style.background = 'var(--accent)'}
                                        >View Landing Page<ExternalIcon /></a>
                                    </div>
                                    {/* Live ads in this campaign — the specific creatives still running
                                        in Google's Transparency Center, each as its own CTA. Hidden when
                                        there are no live creatives identified for this campaign. */}
                                    {audit.liveAds && audit.liveAds.length > 0 && (
                                        <div className="mt-5">
                                            <p className="text-xs font-semibold uppercase tracking-wider mb-2.5" style={{ color: 'var(--slate)' }}>Live ads in this campaign</p>
                                            <div className="flex flex-wrap gap-3">
                                                {audit.liveAds.map((ad, i) => (
                                                    <a key={i} href={ad.url} target="_blank" rel="noopener noreferrer"
                                                        className="inline-flex items-center px-4 py-2 text-sm font-semibold rounded-lg border transition-colors"
                                                        style={{ borderColor: 'var(--accent)', color: 'var(--accent)', background: '#fff' }}
                                                        onMouseEnter={e => e.currentTarget.style.background = 'var(--accent-faint)'}
                                                        onMouseLeave={e => e.currentTarget.style.background = '#fff'}>
                                                        {ad.label}
                                                        <svg className="w-3.5 h-3.5 ml-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
                                                    </a>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </section>

                                {/* Brief Key Findings + Recommendations (Nudge-style summary).
                                    When the audit has an adroast.in roast URL we pull the live
                                    roast and derive a fresh summary from it. Falls back to the
                                    hand-written audit.findings + audit.recommendations otherwise. */}
                                <section>
                                    <h2 className="text-2xl font-semibold mb-5 serif" style={{ color: 'var(--ink)' }}>Key Findings</h2>
                                    <div className="rounded-lg p-5 border-l-4" style={{ background: 'var(--danger-light)', borderColor: 'var(--danger)' }}>
                                        {reportId && !liveRoast && !liveRoastError && (
                                            <p className="text-sm" style={{ color: 'var(--slate)' }}>Loading the latest findings from this audit…</p>
                                        )}
                                        {Array.isArray(derivedFindings) ? (
                                            <ul className="space-y-3 text-base leading-relaxed" style={{ color: 'var(--ink-light)' }}>
                                                {derivedFindings.map((f, i) => (
                                                    <li key={i}>
                                                        <strong style={{ color: 'var(--ink)' }}>{f.title}{f.score !== undefined ? ` (${f.score}/10)` : ''}.</strong>{' '}
                                                        {f.explanation || ''}
                                                    </li>
                                                ))}
                                            </ul>
                                        ) : typeof derivedFindings === 'string' && derivedFindings ? (
                                            <p className="text-base leading-relaxed" style={{ color: 'var(--ink-light)' }}>{derivedFindings}</p>
                                        ) : (
                                            (!reportId || liveRoastError) && (
                                                <p className="text-base leading-relaxed" style={{ color: 'var(--ink-light)' }}>{audit.findings}</p>
                                            )
                                        )}
                                    </div>
                                </section>

                                <section>
                                    <h2 className="text-2xl font-semibold mb-5 serif" style={{ color: 'var(--ink)' }}>Recommendations</h2>
                                    <div className="rounded-lg p-5 border-l-4" style={{ background: 'var(--success-light)', borderColor: 'var(--success)' }}>
                                        {reportId && !liveRoast && !liveRoastError && (
                                            <p className="text-sm" style={{ color: 'var(--slate)' }}>Loading recommendations from this audit…</p>
                                        )}
                                        {Array.isArray(derivedRecs) ? (
                                            <ul className="space-y-2 text-base leading-relaxed list-disc pl-5" style={{ color: 'var(--ink-light)' }}>
                                                {derivedRecs.map((rec, i) => (
                                                    <li key={i}>{rec}</li>
                                                ))}
                                            </ul>
                                        ) : (
                                            (!reportId || liveRoastError) && (
                                                <p className="text-base leading-relaxed" style={{ color: 'var(--ink-light)' }}>{audit.recommendations}</p>
                                            )
                                        )}
                                    </div>
                                </section>
                            </div>

                            {/* Return to Audit 1 button on Audit 5 */}
                            {String(auditId) === '5' && (
                                <div className="px-6 sm:px-8 py-5 border-t flex justify-center" style={{ borderColor: 'var(--cloud)' }}>
                                    <button onClick={() => onNavigate('audit', partnerId, clientId, '1')}
                                        className="inline-flex items-center px-5 py-2.5 text-white text-sm font-semibold rounded-lg transition-colors"
                                        style={{ background: 'var(--accent)' }}
                                        onMouseEnter={e => e.currentTarget.style.background = 'var(--accent-hover)'}
                                        onMouseLeave={e => e.currentTarget.style.background = 'var(--accent)'}
                                    >
                                        <svg className="h-4 w-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                                        Return to Audit 1
                                    </button>
                                </div>
                            )}

                            <ContentNav current={auditId} partnerId={partnerId} clientId={clientId} onNavigate={onNavigate} />
                        </div>
                    </div>
                </PageShell>
            );
        };

        /* ============================================================
           AUDIT FULL VIEW — rich card-based UI (deep dive)
           Accessed via the 'Open Complete Audit Report' button on AuditPage.
           ============================================================ */
        const AuditFullPage = ({ partnerId, clientId, auditId, onNavigate, accessMode }) => {
            const { partner, client } = resolvePortalClient(partnerId, clientId);
            const audit = client ? client.audits[auditId] : null;
            if (!audit || !audit.parsed) return null;

            const crumbs = accessMode === 'master'
                ? [
                    { label: 'Portal', onClick: () => onNavigate('portal-root') },
                    { label: partner.name, onClick: () => onNavigate('partner-workspace', partnerId) },
                    { label: client.name, onClick: () => onNavigate('client-hub', partnerId, clientId) },
                    { label: `Audit ${auditId}`, onClick: () => onNavigate('audit', partnerId, clientId, auditId) },
                    { label: 'Complete Report' }
                ]
                : accessMode === 'partner'
                ? [
                    { label: partner.name, onClick: () => onNavigate('partner-workspace', partnerId) },
                    { label: client.name, onClick: () => onNavigate('client-hub', partnerId, clientId) },
                    { label: `Audit ${auditId}`, onClick: () => onNavigate('audit', partnerId, clientId, auditId) },
                    { label: 'Complete Report' }
                ]
                : [
                    { label: client.name, onClick: () => onNavigate('client-hub', partnerId, clientId) },
                    { label: `Audit ${auditId}`, onClick: () => onNavigate('audit', partnerId, clientId, auditId) },
                    { label: 'Complete Report' }
                ];

            return (
                <PageShell crumbs={crumbs} onNavigate={onNavigate}>
                    <div className="max-w-5xl mx-auto">
                        <BackButton label={`Back to Audit ${auditId} summary`} onClick={() => onNavigate('audit', partnerId, clientId, auditId)} />
                        <Badge>Complete Audit Report</Badge>
                        <h1 className="text-3xl sm:text-4xl font-bold mt-4 mb-2" style={{ color: 'var(--ink)' }}>{audit.title}</h1>
                        <p className="text-lg mb-8" style={{ color: 'var(--slate)' }}>{audit.summary}</p>
                        <RichAuditView audit={audit} />
                    </div>
                </PageShell>
            );
        };

        /* ============================================================
           CONTENT NAVIGATION (prev / next within client)
           ============================================================ */
        const ContentNav = ({ current, partnerId, clientId, onNavigate }) => {
            const { client } = resolvePortalClient(partnerId, clientId);
            if (!client) return null;
            const auditIds = Object.keys(client.audits);
            const isPositioning = String(current) === 'positioning';

            let prev = null;
            let next = null;

            if (isPositioning) {
                // Positioning report: no prev, next = first audit
                next = auditIds[0];
            } else {
                /* Audit pages: full loop including Positioning.
                   Positioning → 1 → 2 → 3 → 4 → 5 → Positioning. */
                const aidx = auditIds.indexOf(String(current));
                prev = aidx === 0 ? 'positioning' : auditIds[aidx - 1];
                next = aidx === auditIds.length - 1 ? 'positioning' : auditIds[aidx + 1];
            }

            const label = (p) => p === 'positioning' ? 'Positioning Report' : `Audit ${p}`;
            const go = (p) => p === 'positioning'
                ? onNavigate('positioning', partnerId, clientId)
                : onNavigate('audit', partnerId, clientId, p);

            return (
                <div className="flex items-center justify-between px-6 sm:px-8 py-5 border-t" style={{ borderColor: 'var(--cloud)' }}>
                    <div>
                        {prev && (
                            <button onClick={() => go(prev)} className="inline-flex items-center text-sm font-medium transition-colors" style={{ color: 'var(--accent)' }}>
                                <svg className="h-4 w-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>
                                {label(prev)}
                            </button>
                        )}
                    </div>
                    <div>
                        {next && (
                            <button onClick={() => go(next)} className="inline-flex items-center text-sm font-medium transition-colors" style={{ color: 'var(--accent)' }}>
                                {label(next)}
                                <svg className="h-4 w-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>
                            </button>
                        )}
                    </div>
                </div>
            );
        };

        /* ============================================================
           APP ROUTER
           ============================================================ */
        function PortalApp() {
            const [state, setState] = useState({ mode: null, view: 'portal-root', partnerId: null, clientId: null, auditId: null, email: null });
            const [authChecking, setAuthChecking] = useState(true);
            const [authMessage, setAuthMessage] = useState('');

            /* On mount: ask the server if we already have a valid session cookie.
               If yes, drop straight into the portal. If no, show the EmailPasswordGate. */
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const authParam = params.get('auth');
                if (authParam === 'denied') {
                    setAuthMessage('This account is not authorized. The portal is for approved clients and partners only — if you think you should have access, contact Marina.');
                    try { window.history.replaceState(null, '', window.location.pathname + window.location.hash); } catch (e) {}
                } else if (authParam === 'cancelled') {
                    setAuthMessage('Google sign-in was cancelled. Tap "Continue with Google" to try again.');
                    try { window.history.replaceState(null, '', window.location.pathname + window.location.hash); } catch (e) {}
                } else if (authParam === 'error' || authParam === 'missing' || authParam === 'expired') {
                    setAuthMessage('Something went wrong with sign-in. Please try "Continue with Google" again.');
                    try { window.history.replaceState(null, '', window.location.pathname + window.location.hash); } catch (e) {}
                }
                (async () => {
                    try {
                        const meRes = await fetch('/api/auth?action=me');
                        const d = meRes.ok ? await meRes.json() : null;
                        if (d && d.success && d.session) {
                            /* Load ONLY the portal data this user is allowed to see. The
                               full data set never ships in the bundle — it comes from
                               /api/portal-data, filtered server-side by the session. */
                            try {
                                const pdRes = await fetch('/api/portal-data');
                                if (pdRes.ok) {
                                    const pd = await pdRes.json();
                                    if (pd && pd.success && pd.portalData) {
                                        portalData = pd.portalData;
                                    }
                                }
                            } catch (e) { /* portalData stays empty → components render nothing */ }

                            const s = d.session;
                            const next = { mode: s.mode, view: 'portal-root', partnerId: s.partnerId, clientId: s.clientId, auditId: null, email: s.email };
                            if (s.mode === 'partner') {
                                next.view = 'partner-workspace';
                            } else if (s.mode === 'client') {
                                if (portalData.directClients[s.clientId]) {
                                    /* Direct client (e.g. Aikido) → land on the project list.
                                       The direct-client id sits in the partnerId slot. */
                                    next.view = 'client-workspace-hub';
                                    next.partnerId = s.clientId;
                                    next.clientId = null;
                                } else {
                                    next.view = 'client-hub';
                                }
                            }
                            setState(next);
                        }
                    } catch (e) { /* silent — gate will show */ }
                    setAuthChecking(false);
                })();
            }, []);

            const handleLogout = async () => {
                try { await fetch('/api/auth?action=logout', { method: 'POST' }); } catch (e) {}
                setState({ mode: null, view: 'portal-root', partnerId: null, clientId: null, auditId: null, email: null });
            };

            const nav = (v, pid, cid, aid) => {
                setState(prev => {
                    const next = { ...prev, view: v };
                    // In client mode, block escaping to the portal root or partner views.
                    // Send them to their own home: direct clients → project list, otherwise client hub.
                    if (prev.mode === 'client' && (v === 'portal-root' || v === 'partner-workspace')) {
                        next.view = portalData.directClients[prev.partnerId] ? 'client-workspace-hub' : 'client-hub';
                        return next;
                    }
                    // In partner mode, block portal-root
                    if (prev.mode === 'partner' && v === 'portal-root') {
                        next.view = 'partner-workspace';
                        return next;
                    }
                    if (pid !== undefined) next.partnerId = pid;
                    if (cid !== undefined) next.clientId = cid;
                    if (aid !== undefined) next.auditId = aid;
                    return next;
                });
                window.scrollTo(0, 0);
            };

            /* Keep the browser URL bar in sync with the current portal view.
               - On audit / positioning views: the page components themselves set the
                 permalink via history.replaceState (so the user can copy the report URL
                 directly from the address bar).
               - On hub / workspace / root views: restore /#portal so the bar doesn't
                 keep showing a stale permalink from a previous page. */
            useEffect(() => {
                const isPermalinkView = state.view === 'audit' || state.view === 'positioning' || state.view === 'audit-full';
                if (isPermalinkView) return; // the page itself sets the permalink
                try {
                    const target = '/#portal';
                    if (window.location.pathname + window.location.search + window.location.hash !== target) {
                        window.history.replaceState(null, '', target);
                    }
                } catch (e) { /* ignore */ }
            }, [state.view]);

            const { mode, view, partnerId, clientId, auditId } = state;

            /* Still checking session — render a brief loading state so the gate
               doesn't flash before the cookie check completes. */
            if (authChecking) {
                return (
                    <div className="min-h-screen flex items-center justify-center" style={{ background: 'var(--mist)' }}>
                        <div className="inline-block w-6 h-6 rounded-full border-2 animate-spin" style={{ borderColor: 'var(--cloud)', borderTopColor: 'var(--accent)' }}></div>
                    </div>
                );
            }

            if (!mode) return <EmailPasswordGate initialMessage={authMessage} />;

            /* Floating signed-in indicator: shows the authenticated email + a logout
               button, fixed to the top-right corner across all portal pages. */
            const AuthIndicator = () => (
                <div className="fixed top-3 right-3 sm:top-4 sm:right-4 z-50 flex items-center gap-2 bg-white border rounded-full pl-3 pr-1 py-1 shadow-sm"
                    style={{ borderColor: 'var(--cloud)' }}>
                    <span className="text-xs font-medium hidden sm:inline" style={{ color: 'var(--slate)' }}>{state.email}</span>
                    <button onClick={handleLogout}
                        className="inline-flex items-center gap-1 text-xs font-semibold px-3 py-1.5 rounded-full bg-transparent border-0 cursor-pointer hover:bg-gray-100 transition-colors"
                        style={{ color: 'var(--ink-light)' }}
                        title={`Sign out (${state.email})`}>
                        <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                        Sign out
                    </button>
                </div>
            );

            /* A client's "home" — never the full portal. Direct clients (Aikido) see
               their project list; partner-scoped clients see their client hub.
               Used as the fallback for any view a client shouldn't reach. */
            const clientHome = portalData.directClients[partnerId]
                ? <DirectClientHub partnerId={partnerId} onNavigate={nav} accessMode={mode} />
                : <ClientHub partnerId={partnerId} clientId={clientId} onNavigate={nav} accessMode={mode} />;

            const page = (() => {
                switch (view) {
                    case 'portal-root':
                        return mode === 'master'
                            ? <PortalRoot onNavigate={nav} />
                            : mode === 'partner'
                            ? <PartnerWorkspace partnerId={partnerId} onNavigate={nav} accessMode={mode} />
                            : clientHome;
                    case 'partner-workspace':
                        return (mode === 'master' || mode === 'partner')
                            ? <PartnerWorkspace partnerId={partnerId} onNavigate={nav} accessMode={mode} />
                            : clientHome;
                    case 'client-workspace-hub':
                        return <DirectClientHub partnerId={partnerId} onNavigate={nav} accessMode={mode} />;
                    case 'client-hub':
                        return <ClientHub partnerId={partnerId} clientId={clientId} onNavigate={nav} accessMode={mode} />;
                    case 'positioning':
                        return <PositioningReportPage partnerId={partnerId} clientId={clientId} onNavigate={nav} accessMode={mode} />;
                    case 'audit':
                        return <AuditPage partnerId={partnerId} clientId={clientId} auditId={auditId} onNavigate={nav} accessMode={mode} />;
                    case 'audit-full':
                        return <AuditFullPage partnerId={partnerId} clientId={clientId} auditId={auditId} onNavigate={nav} accessMode={mode} />;
                    default:
                        return mode === 'master'
                            ? <PortalRoot onNavigate={nav} />
                            : mode === 'partner'
                            ? <PartnerWorkspace partnerId={partnerId} onNavigate={nav} accessMode={mode} />
                            : clientHome;
                }
            })();
            return <>{page}<AuthIndicator /></>;
        }

        // Portal render handled by RootRouter below


    /* ============================================================

    function setFaviconAndTitle(isPortal) {
      const link = document.getElementById('dynamic-favicon');
      if (link) link.href = FAVICON_LINKEDIN;
      document.title = isPortal ? 'AdRoast | Partner Portal' : 'AdRoast';
    }

    /* ============================================================
       ROOT ROUTER - Serves main site or portal based on URL hash
       ============================================================ */
    function RootRouter() {
      const [route, setRoute] = useState(window.location.hash);

      useEffect(() => {
        const onHash = () => setRoute(window.location.hash);
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      const isPortal = route === '#portal';
      const isAdmin = route === '#audit-mk7x9q2f';

      useEffect(() => {
        setFaviconAndTitle(isPortal);
      }, [isPortal]);

      if (isPortal) {
        return <div className="portal-mode"><PortalApp /></div>;
      }
      return <AdRoastApp adminMode={isAdmin} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<RootRouter />);
