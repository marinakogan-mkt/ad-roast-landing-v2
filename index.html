    function AdRoastApp({ adminMode = false }) {
      const [view, setView] = useState('landing');
      const [guidedStep, setGuidedStep] = useState(0);

         display path, campaign/ad-group/ad-name, Ad Strength, Google policy flag, and notes. */

        campaign: '',
        adGroup: '',
        adName: '',
        finalUrl: '',
        path1: '',
        path2: '',

        descriptionPins: ['', '']      // '' = unpinned; '1' | '2' = pinned position
      });

      const [platform, setPlatform] = useState(null);
      const [offerType, setOfferType] = useState(null);
      const [icp, setIcp] = useState('');

      const [linkedinErr, setLinkedinErr] = useState(null);

      const [copied, setCopied] = useState({});
      const [error, setError] = useState(null);
      const [loading, setLoading] = useState(false);
      const [reportEmail, setReportEmail] = useState('');
      const [reportEmailErr, setReportEmailErr] = useState(null);
      const [pdfStatus, setPdfStatus] = useState(null);
      const [shareableLink, setShareableLink] = useState('');
      const [isSharedView, setIsSharedView] = useState(false);
      const [isPortalView, setIsPortalView] = useState(adminMode);
      const [legalModal, setLegalModal] = useState(null);
      const [needsPayment, setNeedsPayment] = useState(false);
      const [paymentVerified, setPaymentVerified] = useState(false);
      const [unlockEmail, setUnlockEmail] = useState('');
      const [unlockLoading, setUnlockLoading] = useState(false);
      const [unlockError, setUnlockError] = useState(null);
      const [isUnlocked, setIsUnlocked] = useState(false);
      const [showUnlockModal, setShowUnlockModal] = useState(false);

      // Auto-generate link after verified payment
      React.useEffect(() => {
        if (paymentVerified && result && reportEmail && view === 'results') {
          setPaymentVerified(false);
          sendReportLink(true);
        }
      }, [paymentVerified, view]);
      const hasInput = inputs.url.trim() || inputs.copy.trim() || inputs.adScreenshot;
      const canProceed = platform && offerType && icp.length > 10;
      const showFull = isPortalView || isUnlocked;

      // Check for shared report in URL on load
      React.useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const reportId = params.get('id');
        const synthId = params.get('synth');
        const portalParam = params.get('portal');
        const paymentStatus = params.get('payment');
        const stripeSessionId = params.get('session_id');

        // Synthesis report (shareable): /?synth=XXX
        if (synthId) {
          setView('loading-report');
          fetch(`/api/synthesize?id=${encodeURIComponent(synthId)}`)
            .then(r => r.json())
            .then(d => {
              if (d && d.markdown) {
                setSynthResult(d);
                setView('synthesis-result');
              } else {
                setError('Synthesis report not found');
                setView('landing');
              }
            })
            .catch(e => { setError('Failed to load synthesis: ' + e.message); setView('landing'); });
          return;
        }

        if (portalParam === '1') setIsPortalView(true);

        // Handle Stripe payment return
        if (paymentStatus === 'success' && stripeSessionId) {
          // Restore saved state
          try {
            const saved = JSON.parse(sessionStorage.getItem('adroast_pending'));
            if (saved) {
              setResult(saved.result);
              setIcp(saved.icp || '');
              setPlatform(saved.platform || null);
              setReportEmail(saved.email || '');
              setLinkedin(saved.linkedin || '');
            }
          } catch(e) {}

          // Verify payment with Stripe
          fetch('/api/verify-payment', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId: stripeSessionId })
          })
            .then(res => res.json())
            .then(data => {
              if (data.paid) {
                sessionStorage.removeItem('adroast_pending');
                setPaymentVerified(true);
                setIsUnlocked(true);
                setView('results');

        if (paymentStatus === 'cancelled') {

      const submitLinkedIn = async () => {

      const generate = async () => {

        try {

          });

        } catch (err) { setError(err.message); setView('guided'); }
        setLoading(false);
      };

      /* Admin-only: submit a multi-variant audit. Flattens all variants — including pin
         positions, display paths, Ad Strength, campaign metadata — into a structured
         adCopy block so the LLM can analyze the full RSA structure as one audit. */
      const generateAdvanced = async () => {
        setError(null); setLoading(true); setView('processing');
        const variantsText = adVariants.map((v, i) => {
          const hl = v.headlines.map((h, idx) => {
            const t = (h || '').trim();
            if (!t) return null;
            const pin = (v.headlinePins?.[idx] || '').trim();
            return `  ${idx + 1}. ${t}${pin ? ` [pinned slot ${pin}]` : ''}`;
          }).filter(Boolean).join('\n');
          const desc = v.descriptions.map((d, idx) => {
            const t = (d || '').trim();
            if (!t) return null;
            const pin = (v.descriptionPins?.[idx] || '').trim();
            return `  ${idx + 1}. ${t}${pin ? ` [pinned slot ${pin}]` : ''}`;
          }).filter(Boolean).join('\n');
          const meta = [];
          if (v.campaign) meta.push(`Campaign: ${v.campaign}`);
          if (v.adGroup) meta.push(`Ad group: ${v.adGroup}`);
          if (v.adName) meta.push(`Ad name: ${v.adName}`);
          if (v.adStrength) meta.push(`Ad Strength: ${v.adStrength}`);
          if (v.googleFlag) meta.push(`Google flag: ${v.googleFlag}`);
          const displayPath = [v.path1, v.path2].filter(Boolean).join('/');
          return [
            `=== ${v.name || `Variant ${i + 1}`} ===`,
            meta.length ? meta.join(' | ') : '',
            hl ? `HEADLINES:\n${hl}` : '',
            desc ? `DESCRIPTIONS:\n${desc}` : '',
            v.finalUrl ? `FINAL URL: ${v.finalUrl}${displayPath ? `   (display path: /${displayPath})` : ''}` : (displayPath ? `DISPLAY PATH: /${displayPath}` : ''),
            v.notes ? `NOTES: ${v.notes}` : ''
          ].filter(Boolean).join('\n');
        }).join('\n\n');
        const payload = {
          platform,
          offerType,
          icpDescription: icp,
          landingUrl: inputs.url,
          adCopy: variantsText,
          variants: adVariants,
          isAdvancedAudit: true
        };
        try {
          const res = await fetch('/api/roast', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'API error');
          setResult(data); setView('results');
        } catch (err) { setError(err.message); setView('admin-builder'); }
        setLoading(false);
      };

      /* Admin-only helpers to mutate the variants array. */
      const updateVariant = (i, patch) => setAdVariants(prev => prev.map((v, idx) => idx === i ? { ...v, ...patch } : v));
      const updateHeadline = (vi, hi, value) => setAdVariants(prev => prev.map((v, idx) => {
        if (idx !== vi) return v;
        const nh = [...v.headlines]; nh[hi] = value;
        return { ...v, headlines: nh };
      }));
      const updateHeadlinePin = (vi, hi, value) => setAdVariants(prev => prev.map((v, idx) => {
        if (idx !== vi) return v;
        const np = [...(v.headlinePins || v.headlines.map(() => ''))]; np[hi] = value;
        return { ...v, headlinePins: np };
      }));
      const updateDescription = (vi, di, value) => setAdVariants(prev => prev.map((v, idx) => {
        if (idx !== vi) return v;
        const nd = [...v.descriptions]; nd[di] = value;
        return { ...v, descriptions: nd };
      }));
      const updateDescriptionPin = (vi, di, value) => setAdVariants(prev => prev.map((v, idx) => {
        if (idx !== vi) return v;
        const np = [...(v.descriptionPins || v.descriptions.map(() => ''))]; np[di] = value;
        return { ...v, descriptionPins: np };
      }));
      const addHeadlineSlot = (vi) => setAdVariants(prev => prev.map((v, idx) => idx === vi && v.headlines.length < 15 ? { ...v, headlines: [...v.headlines, ''], headlinePins: [...(v.headlinePins || []), ''] } : v));
      const removeHeadlineSlot = (vi, hi) => setAdVariants(prev => prev.map((v, idx) => idx === vi ? { ...v, headlines: v.headlines.filter((_, i) => i !== hi), headlinePins: (v.headlinePins || []).filter((_, i) => i !== hi) } : v));
      const addDescriptionSlot = (vi) => setAdVariants(prev => prev.map((v, idx) => idx === vi && v.descriptions.length < 4 ? { ...v, descriptions: [...v.descriptions, ''], descriptionPins: [...(v.descriptionPins || []), ''] } : v));
      const removeDescriptionSlot = (vi, di) => setAdVariants(prev => prev.map((v, idx) => idx === vi ? { ...v, descriptions: v.descriptions.filter((_, i) => i !== di), descriptionPins: (v.descriptionPins || []).filter((_, i) => i !== di) } : v));
      const addVariant = () => setAdVariants(prev => [...prev, newBlankVariant(prev.length + 1)]);
      const removeVariant = (i) => setAdVariants(prev => prev.length <= 1 ? prev : prev.filter((_, idx) => idx !== i));

      /* Replace ALL variants (used by CSV upload). */
      const replaceVariants = (newVariants) => {
        if (!Array.isArray(newVariants) || newVariants.length === 0) return;
        const normalized = newVariants.map((v, i) => ({
          ...newBlankVariant(i + 1),
          ...v,
          headlinePins: v.headlinePins && v.headlinePins.length === v.headlines.length ? v.headlinePins : v.headlines.map(() => ''),
          descriptionPins: v.descriptionPins && v.descriptionPins.length === v.descriptions.length ? v.descriptionPins : v.descriptions.map(() => '')
        }));
        setAdVariants(normalized);
      };

      /* Parse CSV text into variants. Used by file upload AND public-link import.
         Returns { variants: [...], error: 'string' | null }. */
      const csvToVariants = (text) => {
        try {
          const parseCsv = (s) => {
            const rows = []; let row = []; let cell = ''; let q = false;
            for (let i = 0; i < s.length; i++) {
              const c = s[i];
              if (q) {
                if (c === '"' && s[i + 1] === '"') { cell += '"'; i++; }
                else if (c === '"') { q = false; }
                else { cell += c; }
              } else {
                if (c === '"') { q = true; }
                else if (c === ',') { row.push(cell); cell = ''; }
                else if (c === '\n' || c === '\r') {
                  if (c === '\r' && s[i + 1] === '\n') i++;
                  row.push(cell); rows.push(row); row = []; cell = '';
                } else { cell += c; }
              }
            }
            if (cell !== '' || row.length) { row.push(cell); rows.push(row); }
            return rows.filter(r => r.length > 1 || (r.length === 1 && r[0].trim()));
          };
          const rows = parseCsv(text);
          if (rows.length < 2) return { variants: [], error: 'CSV has no data rows.' };
          const headers = rows[0].map(h => h.trim().toLowerCase());
          const idx = (predicates) => {
            for (let i = 0; i < headers.length; i++) {
              const h = headers[i];
              for (const p of predicates) {
                if (typeof p === 'string' ? h === p : p.test(h)) return i;
              }
            }
            return -1;
          };
          const colCampaign = idx(['campaign', /campaign\s*name/]);
          const colAdGroup = idx(['ad group', /ad\s*group/]);
          const colAdName = idx(['ad name', /ad\s*name/]);
          const colFinalUrl = idx(['final url', /final\s*url/]);
          const colPath1 = idx(['path 1', /^path\s*1$/]);
          const colPath2 = idx(['path 2', /^path\s*2$/]);
          const colAdStrength = idx(['ad strength', /ad\s*strength/]);
          const colPolicy = idx(['policy summary', 'approval status', /policy/, /approval/]);
          const headlineCols = [], headlinePinCols = [], descCols = [], descPinCols = [];
          for (let i = 0; i < headers.length; i++) {
            const h = headers[i];
            const hm = h.match(/^headline\s*(\d+)\s*$/);
            const hpm = h.match(/^headline\s*(\d+)\s*(?:position|pin)$/);
            const dm = h.match(/^description\s*(\d+)\s*$/);
            const dpm = h.match(/^description\s*(\d+)\s*(?:position|pin)$/);
            if (hm) headlineCols[parseInt(hm[1], 10) - 1] = i;
            else if (hpm) headlinePinCols[parseInt(hpm[1], 10) - 1] = i;
            else if (dm) descCols[parseInt(dm[1], 10) - 1] = i;
            else if (dpm) descPinCols[parseInt(dpm[1], 10) - 1] = i;
          }
          const variants = [];
          for (let r = 1; r < rows.length; r++) {
            const row = rows[r];
            if (!row || row.every(c => !c || !c.trim())) continue;
            const headlines = [], headlinePins = [];
            for (let hi = 0; hi < headlineCols.length; hi++) {
              const ci = headlineCols[hi]; if (ci == null) continue;
              const val = (row[ci] || '').trim();
              if (val) {
                headlines.push(val);
                const pinCi = headlinePinCols[hi];
                const pin = pinCi != null ? (row[pinCi] || '').trim() : '';
                headlinePins.push(pin.replace(/\D/g, '') || '');
              }
            }
            const descriptions = [], descriptionPins = [];
            for (let di = 0; di < descCols.length; di++) {
              const ci = descCols[di]; if (ci == null) continue;
              const val = (row[ci] || '').trim();
              if (val) {
                descriptions.push(val);
                const pinCi = descPinCols[di];
                const pin = pinCi != null ? (row[pinCi] || '').trim() : '';
                descriptionPins.push(pin.replace(/\D/g, '') || '');
              }
            }
            if (!headlines.length && !descriptions.length) continue;
            variants.push({
              name: (colAdName >= 0 && row[colAdName]?.trim()) ? row[colAdName].trim() : `Variant ${variants.length + 1}`,
              campaign: colCampaign >= 0 ? (row[colCampaign] || '').trim() : '',
              adGroup: colAdGroup >= 0 ? (row[colAdGroup] || '').trim() : '',
              adName: colAdName >= 0 ? (row[colAdName] || '').trim() : '',
              finalUrl: colFinalUrl >= 0 ? (row[colFinalUrl] || '').trim() : '',
              path1: colPath1 >= 0 ? (row[colPath1] || '').trim() : '',
              path2: colPath2 >= 0 ? (row[colPath2] || '').trim() : '',
              adStrength: colAdStrength >= 0 ? (row[colAdStrength] || '').trim() : '',
              googleFlag: colPolicy >= 0 ? (row[colPolicy] || '').trim() : '',
              notes: '',
              headlines: headlines.length ? headlines : ['', '', ''],
              headlinePins: headlines.length ? headlinePins : ['', '', ''],
              descriptions: descriptions.length ? descriptions : ['', ''],
              descriptionPins: descriptions.length ? descriptionPins : ['', '']
            });
          }
          if (!variants.length) return { variants: [], error: 'Could not parse any ads from this file. Expected columns like Headline 1, Description 1, Final URL, etc.' };
          return { variants, error: null };
        } catch (err) {
          return { variants: [], error: 'Failed to parse CSV: ' + err.message };
        }
      };

      /* State for the public-link import flow (admin-only). */
      const [importLink, setImportLink] = useState('');
      const [importLoading, setImportLoading] = useState(false);

      /* Synthesis-result section toggles (open/closed). Keyed by section slug. */
      const [synthOpenSections, setSynthOpenSections] = useState({});

      /* Synthesis Report state (admin-only): multiple roast links → one cross-audit synthesis.
         Auto-persisted to localStorage so a refresh / closed tab doesn't lose progress. */
      const SYNTH_STORAGE_KEY = 'adroast_synth_draft_v1';
      const SYNTH_LIBRARY_KEY = 'adroast_synth_library_v1';
      const loadJSON = (key, fallback) => {
        try {
          if (typeof localStorage === 'undefined') return fallback;
          const v = localStorage.getItem(key);
          return v ? JSON.parse(v) : fallback;
        } catch (e) { return fallback; }
      };
      const saveJSON = (key, value) => {
        try { if (typeof localStorage !== 'undefined') localStorage.setItem(key, JSON.stringify(value)); } catch (e) { /* ignore quota / private mode */ }
      };
      const initialSynthDraft = loadJSON(SYNTH_STORAGE_KEY, null);
      const [synthLinks, setSynthLinks] = useState((initialSynthDraft && Array.isArray(initialSynthDraft.links) && initialSynthDraft.links.length) ? initialSynthDraft.links : ['', '', '', '', '']);
      const [synthClientName, setSynthClientName] = useState(initialSynthDraft?.clientName || '');
      const [synthLibrary, setSynthLibrary] = useState(loadJSON(SYNTH_LIBRARY_KEY, []));
      const [synthLoading, setSynthLoading] = useState(false);
      const [synthResult, setSynthResult] = useState(null);

      /* Persist draft on every change. */
      React.useEffect(() => {
        saveJSON(SYNTH_STORAGE_KEY, { links: synthLinks, clientName: synthClientName });
      }, [synthLinks, synthClientName]);
      /* Persist library on every change. */
      React.useEffect(() => {
        saveJSON(SYNTH_LIBRARY_KEY, synthLibrary);
      }, [synthLibrary]);

      const setSynthLinkAt = (i, value) => setSynthLinks(prev => prev.map((v, idx) => idx === i ? value : v));
      const addSynthLinkSlot = () => setSynthLinks(prev => [...prev, '']);
      const removeSynthLinkSlot = (i) => setSynthLinks(prev => prev.length <= 2 ? prev : prev.filter((_, idx) => idx !== i));

      /* Library management. */
      const saveCurrentToLibrary = () => {
        const filled = synthLinks.map(s => (s || '').trim()).filter(Boolean);
        if (!filled.length) return;
        const existingUrls = new Set(synthLibrary.map(item => item.url));
        const additions = filled
          .filter(u => !existingUrls.has(u))
          .map(u => ({
            id: 'r' + Math.random().toString(36).slice(2, 10),
            url: u,
            label: synthClientName ? `${synthClientName} — Audit` : '',
            addedAt: new Date().toISOString()
          }));
        if (!additions.length) return;
        setSynthLibrary(prev => [...additions, ...prev]);
      };
      const updateLibraryItem = (id, patch) => setSynthLibrary(prev => prev.map(item => item.id === id ? { ...item, ...patch } : item));
      const removeLibraryItem = (id) => setSynthLibrary(prev => prev.filter(item => item.id !== id));
      const insertLibraryItem = (url) => {
        /* Place into the first empty slot; if none, append a new slot. */
        const emptyIdx = synthLinks.findIndex(s => !(s || '').trim());
        if (emptyIdx >= 0) setSynthLinkAt(emptyIdx, url);
        else setSynthLinks(prev => [...prev, url]);
      };
      const clearSynthDraft = () => {
        setSynthLinks(['', '', '', '', '']);
        setSynthClientName('');
      };

      const generateSynthesis = async () => {
        const links = synthLinks.map(s => (s || '').trim()).filter(Boolean);
        if (links.length < 2) { setError('Paste at least 2 AdRoast report links.'); return; }
        setError(null); setSynthLoading(true);
        try {
          const res = await fetch('/api/synthesize', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ roastLinks: links, clientName: synthClientName })
          });
          const data = await res.json();
          if (!res.ok || !data.success) {
            setError(data.error || 'Synthesis failed.');
            setSynthLoading(false);
            return;
          }
          setSynthResult(data);
          setView('synthesis-result');
        } catch (e) {
          setError('Synthesis failed: ' + e.message);
        }
        setSynthLoading(false);
      };

      /* Re-run the LLM on an existing synthesis report, preserving its shareable
         ?synth= URL. Uses the sourceLinks and clientName already stored. */
      const regenerateSynthesis = async () => {
        if (!synthResult?.id || !synthResult?.sourceLinks) return;
        if (!window.confirm('Regenerate this synthesis with the latest prompt? The shareable link will stay the same. The current report will be overwritten.')) return;
        setError(null); setSynthLoading(true);
        try {
          const res = await fetch('/api/synthesize', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              roastLinks: synthResult.sourceLinks,
              clientName: synthResult.clientName || '',
              keepId: synthResult.id
            })
          });
          const data = await res.json();
          if (!res.ok || !data.success) {
            setError(data.error || 'Regeneration failed.');
            setSynthLoading(false);
            return;
          }
          /* Reload the freshly-stored synthesis so we get createdAt/updatedAt etc. */
          const get = await fetch(`/api/synthesize?id=${encodeURIComponent(synthResult.id)}`);
          if (get.ok) {
            const fresh = await get.json();
            setSynthResult(fresh);
          } else {
            setSynthResult({ ...synthResult, markdown: data.markdown });
          }
        } catch (e) {
          setError('Regeneration failed: ' + e.message);
        }
        setSynthLoading(false);
      };

      const importFromLink = async () => {
        const url = (importLink || '').trim();
        if (!url) return;
        setError(null); setImportLoading(true);
        try {
          const res = await fetch('/api/import-file', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url })
          });
          const data = await res.json();
          if (!res.ok || !data.success) {
            setError(data.error || 'Could not import from this link.');
            setImportLoading(false);
            return;
          }
          /* Currently only CSV is parsed client-side. Other formats fall through. */
          if (data.format !== 'csv') {
            setError('This link returned a ' + data.format + ' file. CSV/Google Sheets links are parsed automatically; PDF/Excel parsing is coming soon — for now please export to CSV.');
            setImportLoading(false);
            return;
          }
          const { variants, error: parseError } = csvToVariants(data.text);
          if (parseError) { setError(parseError); setImportLoading(false); return; }
          replaceVariants(variants);
          setImportLink('');
        } catch (err) {
          setError('Import failed: ' + err.message);
        }
        setImportLoading(false);
      };

      /* ─── ADMIN SYNTHESIS BUILDER (internal-only, multi-roast synthesis) ─── */

              <div className="bg-white rounded-lg border border-gray-200 p-5 mb-4">

                  {synthLinks.map((v, i) => (

              <button onClick={generateSynthesis} disabled={filledCount < 2 || synthLoading}
                style={filledCount >= 2 && !synthLoading ? { backgroundColor: '#0a66c2', color: '#fff' } : {}}
                className={`w-full py-3 rounded-full font-semibold text-base flex items-center justify-center gap-2 transition-all ${filledCount >= 2 && !synthLoading ? 'hover:opacity-90' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`}>
                {synthLoading ? 'Synthesizing…' : `Generate Synthesis (${filledCount} reports)`}

                Needs at least 2 reports. Each link must be a public AdRoast report URL (the kind you copy from a saved roast).
              </p>
            </main>
          </div>
        );
      }

      /* ─── SYNTHESIS RESULT VIEW (internal & shareable) — renders with same TOC + collapsible
         sections + NudgeStyleSection styling as the Aikido positioning report. ─── */
      if (view === 'synthesis-result' && synthResult) {
        const shareLink = synthResult.id ? `${window.location.origin}/?synth=${synthResult.id}` : null;
        /* Runtime safety net: scrub charged/sensationalist words from stored synthesis
           content. Existing reports in Redis may have language generated before the
           prompt banlist was added. We replace at render time so users never see them,
           even if the user hasn't clicked Regenerate yet. */
        const scrubChargedLanguage = (text) => {
          if (!text || typeof text !== 'string') return text;
          const replacements = [
            [/\bschizophrenic\b/gi, 'inconsistent'],
            [/\bhemorrhaging\b/gi, 'losing'],
            [/\bhemorrhage(s|d)?\b/gi, (_, s) => 'lose' + (s === 's' ? 's' : s === 'd' ? 'd' : '')],
            [/\bbipolar\b/gi, 'inconsistent'],
            [/\bcancer\b/gi, 'problem'],
            [/\binsane\b/gi, 'extreme'],
            [/\bcrazy\b/gi, 'extreme'],
            [/\bpsycho\b/gi, 'irrational'],
            [/\bmanic\b/gi, 'frantic'],
            [/\banxiety-inducing\b/gi, 'stressful'],
            [/\bweaponize\b/gi, 'leverage'],
            [/\bnuclear\b/gi, 'severe']
          ];
          let out = text;
          for (const [re, sub] of replacements) out = out.replace(re, sub);
          /* Strip capability-disclaimer sentences (e.g., "Can't assess visuals.",
             "Without seeing the image, hard to judge.", "No visual provided."). The
             reader should never see what the model couldn't do. We delete the whole
             sentence containing the disclaimer phrase. */
          const disclaimerSentenceRe = /[^.!?\n]*\b(can'?t|cannot|can\s*not|unable to|couldn'?t|could not|hard to|difficult to|without (seeing|access(ing)?|the (image|visual|asset|screenshot)))\b[^.!?\n]*\b(assess|evaluate|analyze|see|view|verify|determine|judge|gauge|read|inspect|review|comment|tell|know|measure)\b[^.!?\n]*[.!?]?/gi;
          out = out.replace(disclaimerSentenceRe, '');
          const noVisualRe = /[^.!?\n]*\b(no|missing|absent)\s+(image|visual|screenshot|asset|preview)s?\s+(provided|available|attached|shown)\b[^.!?\n]*[.!?]?/gi;
          out = out.replace(noVisualRe, '');
          /* Soften absolutist "Lead with X in all Y / in every Y" recommendations
             into "Prioritize X in Y" — less prescriptive, gives the team room to
             test. Targets recommendation patterns only; doesn't touch factual
             statistics ("trust score averages 3.4/10 across 5 ads") because those
             don't use the "in all/every" prefix.

             Examples:
               "Lead with false positive reduction in all ad headlines and hero sections."
                 -> "Prioritize false positive reduction in ad headlines and hero sections."
               "Use Konstantin S quote in every ad copy."
                 -> "Prioritize Konstantin S quote in ad copy."
          */
          const blanketTargets = '(ad headlines?|headlines?|hero sections?|ads?|landing pages?|LPs?|descriptions?|CTAs?|touchpoints?|asset stacks?|ad copy|ad slots?)';
          /* First: replace action verbs that imply blanket rollout with "Prioritize". */
          out = out.replace(/\bLead with\b/g, 'Prioritize');
          out = out.replace(/\blead with\b/g, 'prioritize');
          /* Then: drop the absolutist quantifier so "in all ad headlines" becomes "in ad headlines". */
          out = out.replace(new RegExp(`\\bin all ${blanketTargets}\\b`, 'gi'), (m, t) => `in ${t}`);
          out = out.replace(new RegExp(`\\bin every ${blanketTargets}\\b`, 'gi'), (m, t) => `in ${t}`);
          out = out.replace(new RegExp(`\\bacross all ${blanketTargets}\\b`, 'gi'), (m, t) => `across ${t}`);
          out = out.replace(new RegExp(`\\bon all ${blanketTargets}\\b`, 'gi'), (m, t) => `on ${t}`);
          out = out.replace(/\bacross the board\b/gi, 'as a priority');
          out = out.replace(/\beverywhere\b/gi, 'as a priority');
          /* Collapse any whitespace left behind by the deletions. */
          out = out.replace(/[ \t]+/g, ' ').replace(/\n{3,}/g, '\n\n').replace(/^\s+/gm, m => m.includes('\n') ? '\n' : '');
          return out;
        };
        /* Parse the markdown into H1 title + metadata + H2 sections. */
        const raw = scrubChargedLanguage((synthResult.markdown || '').trim());
        const h1Match = raw.match(/^#\s+(.+)$/m);
        let reportTitle = h1Match ? h1Match[1].trim() : 'Evidence-Backed Audit Synthesis';
        /* Parse frontmatter metadata anywhere in the document:
           **Prepared for:** … / **Date:** … / **Prepared by:** … */
        const meta = {};
        const metaRe = /\*\*(Prepared for|Date|Prepared by):\*\*\s*([^\n]+)/gi;
        let mm;
        while ((mm = metaRe.exec(raw)) !== null) {
          meta[mm[1].toLowerCase().replace(/\s+/g, '')] = mm[2].trim();
        }
        const trimmed = raw.replace(/^[\s\S]*?(?=\n## )/, '').trim();
        /* Strip numeric prefixes from H2 titles ("1) A) Executive Summary" → "A) Executive Summary") */
        const cleanTitle = (t) => t.replace(/^\d+\)\s*/, '').trim();
        /* True when a section body is empty or contains only Prepared for/Date/Prepared by lines.
           These sections are legacy artifacts (the client name as an H2 with metadata frontmatter
           below it) and should be lifted out of the section list. */
        const META_RE = /^\*\*(Prepared for|Date|Prepared by):\*\*/i;
        const isMetaOnly = (body) => {
          const lines = body.split('\n').map(l => l.trim()).filter(l => l !== '' && l !== '---');
          if (lines.length === 0) return true;
          return lines.every(l => META_RE.test(l));
        };
        const sectionRe = /^## (.+)$/gm;
        const rawSections = [];
        let match, lastIdx = 0, lastTitle = null;
        while ((match = sectionRe.exec(trimmed)) !== null) {
          if (lastTitle !== null) rawSections.push({ title: cleanTitle(lastTitle), body: trimmed.slice(lastIdx, match.index).trim() });
          lastTitle = match[1].trim();
          lastIdx = match.index + match[0].length;
        }
        if (lastTitle !== null) rawSections.push({ title: cleanTitle(lastTitle), body: trimmed.slice(lastIdx).trim() });
        /* Older synthesis reports use H1 = "Positioning Report..." and an H2 = client name
           with metadata-only body. Promote that section title into the report title and
           drop the section from the rendered list. */
        if (rawSections.length > 0 && isMetaOnly(rawSections[0].body) && /Positioning Report|Evidence-Backed Audit Synthesis/i.test(reportTitle)) {
          reportTitle = `${rawSections[0].title} — Evidence-Backed Audit Synthesis`;
        }
        /* Drop empty and meta-only sections from the rendered list. */
        const sections = rawSections.filter(s => s.body && s.body.length > 0 && !isMetaOnly(s.body));
        const slug = (s) => s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
        return (
          <div className="min-h-screen" style={{ background: 'var(--mist)' }}>
            <header className="bg-white border-b" style={{ borderColor: 'var(--cloud)' }}>

              </div>
            </header>
            <main className="max-w-3xl mx-auto px-4 py-8">
              {adminMode && (

                  <button onClick={() => setView('synthesis-builder')}
                    className="inline-flex items-center gap-1.5 text-sm font-medium bg-transparent border-0 cursor-pointer" style={{ color: 'var(--accent)' }}>← Back to builder</button>
                  {synthResult.id && synthResult.sourceLinks && (
                    <button onClick={regenerateSynthesis} disabled={synthLoading}
                      className="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold rounded-full border cursor-pointer"
                      style={{ background: '#fff', borderColor: 'var(--cloud)', color: synthLoading ? 'var(--slate)' : 'var(--ink-light)' }}
                      title="Re-run the LLM on this synthesis with the latest prompt. Keeps the same shareable URL.">
                      <svg className={`w-3.5 h-3.5 ${synthLoading ? 'animate-spin' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                      </svg>
                      {synthLoading ? 'Regenerating…' : 'Regenerate'}
                    </button>
                  )}
                </div>
              )}
              <span className="inline-block px-3 py-1 text-xs font-semibold rounded-full tracking-wide uppercase mb-3" style={{ background: 'var(--accent-light)', color: 'var(--accent)' }}>Strategic Analysis</span>
              <h1 className="text-3xl sm:text-4xl font-bold mt-1 mb-2 serif" style={{ color: 'var(--ink)' }}>{reportTitle}</h1>
              {(meta.preparedfor || meta.date || meta.preparedby) ? (
                <div className="flex flex-wrap gap-x-6 gap-y-1 text-sm mt-3 mb-6" style={{ color: 'var(--slate)' }}>
                  {meta.preparedfor && <span><strong style={{ color: 'var(--ink-light)' }}>Prepared for:</strong> {meta.preparedfor}</span>}
                  {meta.date && <span><strong style={{ color: 'var(--ink-light)' }}>Date:</strong> {meta.date}</span>}
                  {meta.preparedby && <span><strong style={{ color: 'var(--ink-light)' }}>Prepared by:</strong> {meta.preparedby}</span>}
                </div>
              ) : (
                <p className="text-base mb-6" style={{ color: 'var(--slate)' }}>
                  Cross-audit synthesis based on {synthResult.sourceCount || synthResult.sourceLinks?.length || 'multiple'} AdRoast reports{synthResult.createdAt ? ` · ${new Date(synthResult.createdAt).toLocaleDateString()}` : ''}
                </p>
              )}
              {shareLink && (
                <div style={{ backgroundColor: 'var(--accent-faint)', borderColor: 'var(--accent-light)' }} className="border rounded-lg p-3 mb-6 flex items-center gap-2">
                  <Icon name="link" className="w-4 h-4 flex-shrink-0" style={{ color: 'var(--accent)' }} />
                  <input type="text" readOnly value={shareLink}
                    className="flex-1 bg-transparent text-xs outline-none truncate" style={{ color: 'var(--ink-light)' }} />
                  <button onClick={() => copy(shareLink, 'synthLink')} className="p-1.5 hover:bg-blue-100 rounded transition-colors bg-transparent border-0 cursor-pointer">
                    {copied.synthLink ? <Icon name="check" className="w-4 h-4 text-green-600" /> : <Icon name="copy" className="w-4 h-4 text-gray-500" />}
                  </button>
                </div>
              )}
              {/* TOC card — matches Nudge: white bg, rounded-xl, uppercase tracking-wider
                  header, row-flow grid (left-right top-bottom). Sits OUTSIDE the main
                  white report card so it visually separates like Nudge's. */}
              {sections.length > 0 && (
                <div className="rounded-xl border p-5 mb-10" style={{ background: '#fff', borderColor: 'var(--cloud)' }}>
                  <p className="text-xs font-semibold uppercase tracking-wider mb-3" style={{ color: 'var(--slate)' }}>Report Sections</p>
                  <div className="grid sm:grid-cols-2 gap-x-6 gap-y-1.5 text-sm">
                    {sections.map((s, i) => (
                      <a key={i} href={`#${slug(s.title)}`}
                        onClick={(e) => {
                          e.preventDefault();
                          setSynthOpenSections(prev => ({ ...prev, [slug(s.title)]: true }));
                          setTimeout(() => {
                            const el = document.getElementById(slug(s.title));
                            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });

                    ))}

                </div>
              )}
              <div className="bg-white rounded-xl border overflow-hidden" style={{ borderColor: 'var(--cloud)' }}>
                <div className="p-6 sm:p-8 space-y-14">
                {/* Collapsible sections */}
                {sections.map((s, i) => {
                  const sid = slug(s.title);
                  const open = synthOpenSections[sid] !== false; // default open
                  return (
                    <section key={i} id={sid}>
                      <button onClick={() => setSynthOpenSections(prev => ({ ...prev, [sid]: !open }))}
                        className="w-full flex items-center justify-between py-1 group bg-transparent border-0 cursor-pointer text-left">
                        <h2 className="text-2xl font-semibold serif" style={{ color: 'var(--ink)' }}>{s.title}</h2>
                        <svg className={`w-5 h-5 transition-transform flex-shrink-0 ml-4 ${open ? 'rotate-180' : ''}`} style={{ color: 'var(--slate)' }} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                        </svg>
                      </button>
                      {open && (
                        <div className="mt-5">
                          <NudgeStyleSection title={s.title} body={s.body} />
                        </div>
                      )}
                    </section>
                  );
                })}
                </div>
                {/* Audit navigation footer — lists each source audit as a clickable link
                    so the reader can move from the synthesis into the underlying audits.
                    Mirrors the ContentNav at the bottom of Nudge's positioning page. */}
                {synthResult.sourceLinks && synthResult.sourceLinks.length > 0 && (
                  <div className="border-t" style={{ borderColor: 'var(--cloud)' }}>
                    <div className="px-6 sm:px-8 py-5">
                      <p className="text-xs font-semibold uppercase tracking-wider mb-3" style={{ color: 'var(--slate)' }}>Source Audits</p>
                      <div className="grid sm:grid-cols-2 gap-x-6 gap-y-2 text-sm">
                        {synthResult.sourceLinks.map((link, i) => (
                          <a key={i} href={link} target="_blank" rel="noopener noreferrer"
                            className="inline-flex items-center hover:underline" style={{ color: 'var(--accent)' }}>
                            <span className="mr-1.5 font-medium">Audit {i + 1}</span>
                            <svg className="w-3 h-3 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
                          </a>
                        ))}
                      </div>
                    </div>
                    {synthResult.sourceLinks[0] && (
                      <div className="px-6 sm:px-8 py-5 border-t flex justify-end" style={{ borderColor: 'var(--cloud)' }}>
                        <a href={synthResult.sourceLinks[0]} target="_blank" rel="noopener noreferrer"
                          className="inline-flex items-center text-sm font-medium" style={{ color: 'var(--accent)' }}>
                          Audit 1
                          <svg className="h-4 w-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>
                        </a>
                      </div>
                    )}
                  </div>
                )}
              </div>
              {synthResult.failures && synthResult.failures.length > 0 && (
                <div className="mt-5 p-3 bg-amber-50 border border-amber-200 rounded text-sm">
                  <strong className="text-amber-800">Note:</strong> {synthResult.failures.length} link(s) couldn't be loaded and were skipped: {synthResult.failures.map(f => f.error).join(' · ')}
                </div>
              )}
            </main>
          </div>
        );
      }

      /* ─── ADMIN BUILDER (internal-only, advanced multi-variant audit) ─── */
      if (view === 'admin-builder' && adminMode) {
        const canRun = !!icp.trim() && !!platform && !!offerType && adVariants.some(v =>
          v.headlines.some(h => h.trim()) || v.descriptions.some(d => d.trim()) || v.notes?.trim()
        );
        return (
          <div className="min-h-screen bg-gray-100">
            <header className="bg-white border-b border-gray-200">
              <div className="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
                <div onClick={reset} className="flex items-center gap-2 cursor-pointer">
                  <img src={ADROAST_LOGO} alt="AdRoast" className="w-9 h-9 rounded" />
                  <span className="text-gray-300 text-lg font-light">|</span>
                  <span className="text-xl text-gray-800 font-semibold">AdRoast</span>
                </div>
                <span className="px-3 py-1 bg-green-100 text-green-700 text-xs font-bold rounded-full border border-green-300">INTERNAL</span>
              </div>
            </header>
            <main className="max-w-3xl mx-auto px-4 py-8">
              <button
                onClick={() => setView('landing')}
                className="inline-flex items-center gap-1.5 mb-4 text-sm font-medium text-gray-600 hover:text-blue-600 bg-transparent border-0 cursor-pointer"
              >← Back to home</button>
              <div className="mb-6">
                <h1 className="text-2xl font-semibold text-gray-900 mb-1">Advanced Audit Builder</h1>
                <p className="text-sm text-gray-500 mb-4">Full Google Ads RSA fields: headlines + pins, descriptions + pins, display paths, Ad Strength, policy flags. Multiple variants per audit.</p>

                <div className="bg-white rounded-lg border border-gray-200 p-4">
                  <div className="text-xs font-bold uppercase tracking-wide text-gray-500 mb-3">Import from a file or public link</div>
                  <div className="flex flex-col sm:flex-row gap-2 items-stretch">
                    <input
                      type="url"
                      value={importLink}
                      onChange={(e) => setImportLink(e.target.value)}
                      placeholder="Paste a public Google Sheets / Drive link…"
                      className="flex-1 px-3 py-2 bg-white border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500 text-gray-900"
                    />
                    <button
                      onClick={importFromLink}
                      disabled={!importLink.trim() || importLoading}
                      style={!importLink.trim() || importLoading ? {} : { backgroundColor: '#0a66c2', color: '#fff' }}
                      className={`px-5 py-2 rounded font-semibold text-sm whitespace-nowrap transition-colors ${!importLink.trim() || importLoading ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'hover:opacity-90'}`}
                    >{importLoading ? 'Importing…' : 'Import from link'}</button>
                    <label className="inline-flex items-center justify-center gap-2 px-4 py-2 bg-white border border-blue-300 text-blue-700 text-sm font-semibold rounded hover:bg-blue-50 cursor-pointer transition-colors whitespace-nowrap">
                      <Icon name="upload" className="w-4 h-4" />
                      Upload file
                      <input
                        type="file"
                        className="hidden"
                        onChange={(e) => {
                          const file = e.target.files?.[0];
                          if (!file) { return; }
                          setError(null);
                          const lower = (file.name || '').toLowerCase();
                          const isCsv = lower.endsWith('.csv') || (file.type || '').includes('csv');
                          if (!isCsv) {
                            setError('CSV is supported today. PDF / Excel parsing is coming soon — please export your sheet to CSV, or paste a public Google Sheets link instead.');
                            e.target.value = '';
                            return;
                          }
                          const reader = new FileReader();
                          reader.onload = () => {
                            const { variants, error: parseError } = csvToVariants(String(reader.result || ''));
                            if (parseError) { setError(parseError); return; }
                            replaceVariants(variants);
                          };
                          reader.readAsText(file);
                          e.target.value = '';
                        }}
                      />
                    </label>
                  </div>
                  <p className="text-xs text-gray-400 mt-2">
                    For Google Sheets / Drive links: make sure sharing is set to <strong>Anyone with the link</strong>.
                    File upload accepts any type but currently only CSV is parsed automatically (PDF / Excel support coming).
                  </p>
                </div>
              </div>
              {error && <div className="mb-5 p-3 bg-red-50 border border-red-200 rounded text-red-700 flex items-center gap-2 text-sm"><Icon name="alertCircle" className="w-4 h-4" />{error}</div>}

              {/* Shared metadata */}
              <div className="bg-white rounded-lg border border-gray-200 p-5 mb-5 space-y-4">
                <div>
                  <label className="block text-sm font-semibold text-gray-900 mb-1">Target audience (ICP)</label>
                  <textarea placeholder="e.g., DevSecOps leads at Series B+ SaaS companies frustrated with Snyk's per-LOC pricing..."
                    value={icp} onChange={(e) => setIcp(e.target.value)}
                    className="w-full h-20 px-3 py-2 bg-white border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 resize-none text-gray-900" />
                </div>
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="block text-sm font-semibold text-gray-900 mb-2">Platform</label>
                    <div className="grid grid-cols-3 gap-2">
                      {['Meta', 'Google', 'LinkedIn'].map((p) => (
                        <button key={p} onClick={() => setPlatform(p.toLowerCase())}
                          style={platform === p.toLowerCase() ? { borderColor: '#0a66c2', backgroundColor: '#e8f3ff', color: '#0a66c2' } : {}}
                          className={`p-2 rounded border-2 text-sm font-medium transition-all ${platform === p.toLowerCase() ? '' : 'border-gray-200 hover:border-gray-300 text-gray-700 bg-white'}`}>{p}</button>
                      ))}
                    </div>
                  </div>
                  <div>
                    <label className="block text-sm font-semibold text-gray-900 mb-2">Offer type</label>
                    <div className="grid grid-cols-2 gap-2">
                      {[{ id: 'demo', label: 'Demo' }, { id: 'trial', label: 'Trial' }].map((o) => (
                        <button key={o.id} onClick={() => setOfferType(o.id)}
                          style={offerType === o.id ? { borderColor: '#0a66c2', backgroundColor: '#e8f3ff', color: '#0a66c2' } : {}}
                          className={`p-2 rounded border-2 text-sm font-medium transition-all ${offerType === o.id ? '' : 'border-gray-200 hover:border-gray-300 text-gray-700 bg-white'}`}>{o.label}</button>
                      ))}
                    </div>
                  </div>
                </div>
                <div>
                  <label className="block text-sm font-semibold text-gray-900 mb-1">Landing page URL <span className="text-gray-400 font-normal">(optional)</span></label>
                  <input type="url" placeholder="https://example.com/landing"
                    value={inputs.url} onChange={(e) => setInputs(p => ({ ...p, url: e.target.value }))}
                    className="w-full px-3 py-2 bg-white border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-gray-900" />
                </div>
              </div>

              {/* Variant blocks */}
              {adVariants.map((v, vi) => (
                <div key={vi} className="bg-white rounded-lg border border-gray-200 p-5 mb-4">
                  <div className="flex items-center justify-between mb-4">
                    <input type="text" value={v.name} onChange={(e) => updateVariant(vi, { name: e.target.value })}
                      className="text-base font-semibold text-gray-900 bg-transparent border-0 border-b border-transparent hover:border-gray-300 focus:border-blue-500 focus:outline-none px-1 py-0.5"
                      style={{ width: 'auto', minWidth: 120 }} />
                    {adVariants.length > 1 && (
                      <button onClick={() => removeVariant(vi)} className="text-xs text-gray-400 hover:text-red-500 px-2 py-1 rounded hover:bg-red-50 bg-transparent border-0 cursor-pointer">Remove variant</button>
                    )}
                  </div>

                  {/* Campaign metadata row */}
                  <div className="grid grid-cols-1 sm:grid-cols-3 gap-2 mb-4">
                    <input type="text" value={v.campaign} onChange={(e) => updateVariant(vi, { campaign: e.target.value })}
                      placeholder="Campaign"
                      className="px-3 py-1.5 bg-white border border-gray-300 rounded text-xs focus:outline-none focus:border-blue-500 text-gray-900" />
                    <input type="text" value={v.adGroup} onChange={(e) => updateVariant(vi, { adGroup: e.target.value })}
                      placeholder="Ad group"
                      className="px-3 py-1.5 bg-white border border-gray-300 rounded text-xs focus:outline-none focus:border-blue-500 text-gray-900" />
                    <input type="text" value={v.adName} onChange={(e) => updateVariant(vi, { adName: e.target.value })}
                      placeholder="Ad name"
                      className="px-3 py-1.5 bg-white border border-gray-300 rounded text-xs focus:outline-none focus:border-blue-500 text-gray-900" />
                  </div>

                  {/* Headlines (with pin position) */}
                  <div className="mb-4">
                    <div className="flex items-center justify-between mb-2">
                      <label className="text-sm font-semibold text-gray-700">Headlines <span className="text-gray-400 font-normal">({v.headlines.length}/15)</span></label>
                      {v.headlines.length < 15 && (
                        <button onClick={() => addHeadlineSlot(vi)} className="text-xs text-blue-600 hover:underline bg-transparent border-0 cursor-pointer">+ Add headline</button>
                      )}
                    </div>
                    <div className="space-y-1.5">
                      {v.headlines.map((h, hi) => (
                        <div key={hi} className="flex items-center gap-2">
                          <span className="text-xs text-gray-400 w-6 text-right">{hi + 1}.</span>
                          <input type="text" value={h} onChange={(e) => updateHeadline(vi, hi, e.target.value)}
                            placeholder={`Headline ${hi + 1}`}
                            maxLength={30}
                            className="flex-1 px-3 py-1.5 bg-white border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-gray-900" />
                          <span className="text-xs text-gray-400 w-8 text-right">{h.length}/30</span>
                          <select value={v.headlinePins?.[hi] || ''} onChange={(e) => updateHeadlinePin(vi, hi, e.target.value)}
                            className="px-1 py-1.5 bg-white border border-gray-300 rounded text-xs focus:outline-none focus:border-blue-500 text-gray-700"
                            title="Pin position">
                            <option value="">—</option>
                            <option value="1">Pin 1</option>
                            <option value="2">Pin 2</option>
                            <option value="3">Pin 3</option>
                          </select>
                          {v.headlines.length > 1 && (
                            <button onClick={() => removeHeadlineSlot(vi, hi)} className="text-gray-300 hover:text-red-500 px-1 bg-transparent border-0 cursor-pointer text-base">×</button>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Descriptions (with pin position) */}
                  <div className="mb-4">
                    <div className="flex items-center justify-between mb-2">
                      <label className="text-sm font-semibold text-gray-700">Descriptions <span className="text-gray-400 font-normal">({v.descriptions.length}/4)</span></label>
                      {v.descriptions.length < 4 && (
                        <button onClick={() => addDescriptionSlot(vi)} className="text-xs text-blue-600 hover:underline bg-transparent border-0 cursor-pointer">+ Add description</button>
                      )}
                    </div>
                    <div className="space-y-1.5">
                      {v.descriptions.map((d, di) => (
                        <div key={di} className="flex items-start gap-2">
                          <span className="text-xs text-gray-400 w-6 text-right mt-2">{di + 1}.</span>
                          <textarea value={d} onChange={(e) => updateDescription(vi, di, e.target.value)}
                            placeholder={`Description ${di + 1}`}
                            maxLength={90} rows={2}
                            className="flex-1 px-3 py-1.5 bg-white border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 resize-none text-gray-900" />
                          <span className="text-xs text-gray-400 w-8 text-right mt-2">{d.length}/90</span>
                          <select value={v.descriptionPins?.[di] || ''} onChange={(e) => updateDescriptionPin(vi, di, e.target.value)}
                            className="px-1 py-1.5 bg-white border border-gray-300 rounded text-xs focus:outline-none focus:border-blue-500 text-gray-700 mt-1"
                            title="Pin position">
                            <option value="">—</option>
                            <option value="1">Pin 1</option>
                            <option value="2">Pin 2</option>
                          </select>
                          {v.descriptions.length > 1 && (
                            <button onClick={() => removeDescriptionSlot(vi, di)} className="text-gray-300 hover:text-red-500 px-1 bg-transparent border-0 cursor-pointer text-base mt-1">×</button>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Final URL + Display Path */}
                  <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-3">
                    <div className="sm:col-span-3">
                      <label className="block text-xs font-semibold text-gray-600 mb-1">Final URL <span className="text-gray-400 font-normal">(optional)</span></label>
                      <input type="url" value={v.finalUrl} onChange={(e) => updateVariant(vi, { finalUrl: e.target.value })}
                        placeholder="https://destination.com/path"
                        className="w-full px-3 py-1.5 bg-white border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-gray-900" />
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-gray-600 mb-1">Display path 1</label>
                      <input type="text" value={v.path1} onChange={(e) => updateVariant(vi, { path1: e.target.value })}
                        placeholder="security"
                        maxLength={15}
                        className="w-full px-3 py-1.5 bg-white border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500 text-gray-900" />
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-gray-600 mb-1">Display path 2</label>
                      <input type="text" value={v.path2} onChange={(e) => updateVariant(vi, { path2: e.target.value })}
                        placeholder="sast"
                        maxLength={15}
                        className="w-full px-3 py-1.5 bg-white border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500 text-gray-900" />
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-gray-600 mb-1">Ad Strength</label>
                      <select value={v.adStrength} onChange={(e) => updateVariant(vi, { adStrength: e.target.value })}
                        className="w-full px-3 py-1.5 bg-white border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500 text-gray-900">
                        <option value="">—</option>
                        <option value="Excellent">Excellent</option>
                        <option value="Good">Good</option>
                        <option value="Average">Average</option>
                        <option value="Poor">Poor</option>
                        <option value="Limited Approved">Limited Approved</option>
                      </select>
                    </div>
                  </div>

                  {/* Google flag + Notes */}
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <div>
                      <label className="block text-xs font-semibold text-gray-600 mb-1">Google flag / policy <span className="text-gray-400 font-normal">(optional)</span></label>
                      <input type="text" value={v.googleFlag} onChange={(e) => updateVariant(vi, { googleFlag: e.target.value })}
                        placeholder='e.g., "Add 1 more sitelink"'
                        className="w-full px-3 py-1.5 bg-white border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500 text-gray-900" />
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-gray-600 mb-1">Notes <span className="text-gray-400 font-normal">(extensions, targeting, etc.)</span></label>
                      <input type="text" value={v.notes} onChange={(e) => updateVariant(vi, { notes: e.target.value })}
                        placeholder="e.g., 4 sitelinks active. Keyword: SAST scanner."
                        className="w-full px-3 py-1.5 bg-white border border-gray-300 rounded text-sm focus:outline-none focus:border-blue-500 text-gray-900" />
                    </div>
                  </div>
                </div>
              ))}

              <div className="mb-6">
                <button onClick={addVariant}
                  className="w-full py-3 bg-white border-2 border-dashed border-gray-300 rounded text-sm font-medium text-gray-500 hover:border-blue-400 hover:text-blue-600 hover:bg-blue-50 transition-colors cursor-pointer">
                  + Add another variant
                </button>
              </div>

              <button onClick={generateAdvanced} disabled={!canRun || loading}
                style={canRun && !loading ? { backgroundColor: '#0a66c2', color: '#fff' } : {}}
                className={`w-full py-3 rounded-full font-semibold text-base flex items-center justify-center gap-2 transition-all ${canRun && !loading ? 'hover:opacity-90' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`}>
                {loading ? 'Running audit…' : 'Run audit on all variants'}
              </button>
            </main>
          </div>
        );
      }

      /* ─── GUIDED (step-by-step questions, replaces onboarding + input forms) ─── */
      if (view === 'guided') {
        /* Step list adapts to whether ad copy was already pasted on the landing page.
           If yes, skip the ad-copy step. */
        const steps = [];
        /* guidedHadCopyAtStart is captured at landing-click. The step list stays stable
           even if the user later clears the input mid-flow. */
        if (!guidedHadCopyAtStart) {
          steps.push({ id: 'adCopy', q: 'Paste your ad copy', valid: () => (inputs.copy?.trim().length > 0) || inputs.adScreenshot });
        }
        steps.push({ id: 'icp', q: 'Who are you targeting?', hint: 'Be specific: job title, company size, pain points.', valid: () => icp?.trim().length > 0 });
        steps.push({ id: 'platform', q: 'Which platform is this ad for?', valid: () => !!platform });
        steps.push({ id: 'offer', q: 'What type of offer is this?', valid: () => !!offerType });
        steps.push({ id: 'lpUrl', q: "What's the landing page URL?", hint: "We'll auto-extract all the copy from your page.", valid: () => true });
        const stepIdx = Math.min(guidedStep, steps.length - 1);
        const step = steps[stepIdx];
        const total = steps.length;
        const onContinue = () => {
          if (!step.valid()) return;
          if (stepIdx === total - 1) generate();
          else setGuidedStep(stepIdx + 1);
        };
        return (
          <div className="min-h-screen bg-gray-100">
            <header className="bg-white border-b border-gray-200">
              <div onClick={reset} className="max-w-5xl mx-auto px-4 py-3 flex items-center gap-2 cursor-pointer">
                <img src={ADROAST_LOGO} alt="AdRoast" className="w-9 h-9 rounded" />
                <span className="text-gray-300 text-lg font-light">|</span>
                <span className="text-xl text-gray-800 font-semibold">AdRoast</span>
              </div>
            </header>
            <main className="max-w-md mx-auto px-4 py-10">
              <div className="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
                <div className="flex items-center justify-between mb-1">
                  <p className="text-xs font-semibold uppercase tracking-wide" style={{ color: '#0a66c2' }}>Step {stepIdx + 1} of {total}</p>
                </div>
                <h1 className="text-2xl font-normal text-gray-900 mb-4 mt-2">{step.q}</h1>
                {step.hint && <p className="text-gray-500 text-sm mb-5">{step.hint}</p>}
                <div className="mb-6">
                  {step.id === 'adCopy' && (
                    <div className="space-y-3">
                      <textarea
                        placeholder="Paste your ad headline and body copy..."
                        value={inputs.copy}
                        onChange={(e) => setInputs(p => ({ ...p, copy: e.target.value }))}
                        className="w-full h-40 px-3 py-2 bg-white border border-gray-400 rounded text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 resize-none text-gray-900" />
                      <div className="text-center text-xs text-gray-400">or upload a screenshot</div>
                      {inputs.adScreenshotPreview ? (
                        <div className="relative h-32 border border-gray-200 rounded overflow-hidden bg-gray-50">
                          <img src={inputs.adScreenshotPreview} alt="Ad screenshot" className="w-full h-full object-contain" />
                          <button onClick={() => setInputs(p => ({ ...p, adScreenshot: null, adScreenshotPreview: null }))} className="absolute top-1 right-1 w-6 h-6 bg-white border border-gray-300 rounded-full flex items-center justify-center text-gray-500 hover:text-red-500 text-xs font-bold">✕</button>
                        </div>
                      ) : (
                        <label className="flex flex-col items-center justify-center h-24 border-2 border-dashed border-gray-300 rounded cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition-colors">
                          <Icon name="upload" className="w-5 h-5 text-gray-400 mb-1" />
                          <span className="text-xs text-gray-400">Drop or click to upload</span>
                          <input type="file" accept="image/png,image/jpeg,image/webp" className="hidden" onChange={(e) => {
                            const file = e.target.files?.[0];
                            if (!file) return;
                            if (file.size > 5 * 1024 * 1024) { setError('Image must be under 5MB'); return; }
                            const reader = new FileReader();
                            reader.onload = () => {
                              const base64 = reader.result.split(',')[1];
                              setInputs(p => ({ ...p, adScreenshot: base64, adScreenshotPreview: reader.result }));
                            };
                            reader.readAsDataURL(file);
                          }} />
                        </label>
                      )}
                    </div>
                  )}
                  {step.id === 'icp' && (
                    <textarea
                      placeholder="e.g., Engineering managers at Series B+ startups frustrated with slow CI/CD..."
                      value={icp}
                      onChange={(e) => setIcp(e.target.value)}
                      className="w-full h-32 px-3 py-2 bg-white border border-gray-400 rounded text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 resize-none text-gray-900" />
                  )}
                  {step.id === 'platform' && (
                    <div className="grid grid-cols-3 gap-2">
                      {['Meta', 'Google', 'LinkedIn'].map((p) => (
                        <button key={p} onClick={() => setPlatform(p.toLowerCase())} style={platform === p.toLowerCase() ? { borderColor: '#0a66c2', backgroundColor: '#e8f3ff', color: '#0a66c2' } : {}} className={`p-3 rounded border-2 text-sm font-medium transition-all ${platform === p.toLowerCase() ? '' : 'border-gray-200 hover:border-gray-300 text-gray-700 bg-white'}`}>{p}</button>
                      ))}
                    </div>
                  )}
                  {step.id === 'offer' && (
                    <div className="grid grid-cols-2 gap-2">
                      {[{ id: 'demo', label: 'Book a Demo' }, { id: 'trial', label: 'Free Trial' }].map((o) => (
                        <button key={o.id} onClick={() => setOfferType(o.id)} style={offerType === o.id ? { borderColor: '#0a66c2', backgroundColor: '#e8f3ff', color: '#0a66c2' } : {}} className={`p-3 rounded border-2 text-sm font-medium transition-all ${offerType === o.id ? '' : 'border-gray-200 hover:border-gray-300 text-gray-700 bg-white'}`}>{o.label}</button>
                      ))}
                    </div>
                  )}
                  {step.id === 'lpUrl' && (
                    <input
                      type="url"
                      placeholder="https://your-landing-page.com"
                      value={inputs.url}
                      onChange={(e) => setInputs(p => ({ ...p, url: e.target.value }))}
                      className="w-full px-3 py-2.5 bg-white border border-gray-400 rounded text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-gray-900" />
                  )}
                </div>
                {error && <div className="mb-4 p-3 bg-red-50 border border-red-200 rounded text-red-700 flex items-center gap-2 text-sm"><Icon name="alertCircle" className="w-4 h-4" />{error}</div>}
                <div className="flex gap-2 items-center">
                  <button
                    onClick={() => {
                      if (stepIdx > 0) setGuidedStep(stepIdx - 1);
                      else setView('landing');
                    }}
                    className="px-4 py-2.5 rounded-full font-semibold text-sm border border-gray-300 text-gray-700 hover:bg-gray-50 transition-colors bg-white cursor-pointer"
                  >← Back</button>
                  <button onClick={onContinue} disabled={!step.valid()}
                    style={step.valid() ? { backgroundColor: '#0a66c2', color: '#fff', borderColor: '#0a66c2' } : {}}
                    className={`flex-1 py-2.5 rounded-full font-semibold text-sm flex items-center justify-center gap-2 transition-all ${step.valid() ? 'hover:opacity-90' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`}>
                    {stepIdx === total - 1 ? 'Roast my Ad' : 'Continue'} <Icon name="chevronRight" className="w-4 h-4" />
                  </button>
                </div>
                {/* Progress bar */}
                <div className="mt-6">
                  <div className="w-full bg-gray-200 rounded-full" style={{ height: 4 }}>
                    <div className="rounded-full transition-all" style={{ height: 4, width: `${((stepIdx + 1) / total) * 100}%`, background: '#0a66c2' }} />
                  </div>
                </div>
              </div>
            </main>
          </div>

**Resolution:** This is a product-marketing decision, not a copywriting decision. The buyer searching "SonarQube alternative" is shopping a code-quality replacement; selling them AI Code Review on the ad and AppSec on the LP creates a 3-category collision that contributed to the Limited Approved status on AUDIT-4.

**Recommendation:** Pick a primary category name per product. Suggested mapping:
- **"AI SAST"** → for the security scanner (AUDIT-1, AUDIT-4 LP)
- **"AI Code Review"** → for the PR-comment / quality reviewer (separate product page)
- Stop using *"Code Quality"* as a third name. Fold it under one of the two above

This decision fixes 3 paid campaigns and at least 3 LP H1s. **Strategic decision; copy execution downstream.**

## Final Diagnosis

**The pattern is clear:** Aikido has 1 best-in-class ad (SCA, 8/10, Excellent), 1 solid ad (AI Pentest, 7/10, Good), and 3 ads in the 4-6 range that are fixable in a week of edits. The variance isn't budget or product or market. It's copy choices the SCA team got right and the other 4 teams didn't.

**The fix is not new ads.** The fix is:

1. **Restore SonarQube ad eligibility** (drop 2 policy-trigger headlines). Limited Approved → Eligible within 72h
2. **Move proof from LP to ad** Konstantin S quote in SAST ad, Christian Schmidt in SCA ad, Dan Sherwood in AI Pentest ad, Salvatore Cuccurullo in SonarQube ad

> *"50k+ orgs. 100k+ devs. 4.7/5. Konstantin S (OSOME) left Snyk. Christian Schmidt (Go Autonomous) left Snyk. Salvatore Cuccurullo (GEA) left SonarQube. €3,500 flat pentest, no findings = don't pay."*
